<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brad Dwyer</title>
  <meta name="description" content="Brad Dwyer">
  <link rel="canonical" href="https://dwyer.au">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: "JetBrains Mono", "SF Mono", "Cascadia Code", "Fira Code", monospace;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .name {
      font-size: clamp(1.5rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .name::after {
      content: "_";
      animation: blink 1s step-end infinite;
    }

    .status {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
      min-height: 1.2em;
    }

    .status::after {
      content: "_";
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="center">
    <div class="name" id="name"></div>
    <div class="status" id="status"></div>
  </div>
  <script>
    const messages = [
      "Website arriving soon",
      "Something is brewing",
      "Under construction",
      "Watch this space",
      "Stay tuned",
      "Almost ready",
      "Building something new",
      "Check back shortly",
      "Work in progress",
      "Launching soon",
      "Not quite yet",
      "Patience",
      "Good things take time",
      "Crafting pixels",
      "Wiring things up",
      "One moment",
      "Putting it together",
      "Hang tight",
      "On the way",
      "Still cooking",
      "Just around the corner",
      "In the works",
      "Loading",
      "Assembling",
      "Getting there",
      "Bear with me",
      "Coming right up",
      "Tuning things up",
      "Making it happen",
      "New site who dis",
    ];

    for (let i = messages.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [messages[i], messages[j]] = [messages[j], messages[i]];
    }

    const el = document.getElementById("status");
    let msgIndex = 0;

    const TYPE_SPEED = 70;
    const PAUSE_AFTER = 2500;
    const DELETE_SPEED = 40;
    const PAUSE_BEFORE = 500;

    function typeMessage() {
      const text = messages[msgIndex];
      let i = 0;

      function typeChar() {
        if (i < text.length) {
          el.textContent = text.slice(0, i + 1);
          i++;
          setTimeout(typeChar, TYPE_SPEED);
        } else {
          setTimeout(deleteMessage, PAUSE_AFTER);
        }
      }

      typeChar();
    }

    function deleteMessage() {
      const text = el.textContent;
      let i = text.length;

      function deleteChar() {
        if (i > 0) {
          i--;
          el.textContent = text.slice(0, i);
          setTimeout(deleteChar, DELETE_SPEED);
        } else {
          msgIndex = (msgIndex + 1) % messages.length;
          setTimeout(typeMessage, PAUSE_BEFORE);
        }
      }

      deleteChar();
    }

    function typeName(callback) {
      const nameEl = document.getElementById("name");
      const name = "Brad Dwyer";
      let i = 0;

      function typeChar() {
        if (i < name.length) {
          nameEl.textContent = name.slice(0, i + 1);
          i++;
          const delay = 40 + Math.random() * 80;
          setTimeout(typeChar, delay);
        } else {
          setTimeout(callback, 800);
        }
      }

      typeChar();
    }

    typeName(typeMessage);
  </script>
</body>
</html>
