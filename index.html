<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brad Dwyer</title>
  <meta name="description" content="Brad Dwyer">
  <link rel="canonical" href="https://dwyer.au">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: "JetBrains Mono", "SF Mono", "Cascadia Code", "Fira Code", monospace;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .name {
      font-size: clamp(1.5rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      position: relative;
    }

    .name::after {
      content: "_";
      animation: blink 1s step-end infinite;
    }

    .name .char {
      display: inline-block;
      position: relative;
    }

    .status {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
      min-height: 1.2em;
    }

    .status::after {
      content: "_";
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="center">
    <div class="name" id="name"></div>
    <div class="status" id="status"></div>
  </div>
  <script>
    const messages = [
      "Website arriving soon",
      "Something is brewing",
      "Under construction",
      "Watch this space",
      "Stay tuned",
      "Almost ready",
      "Building something new",
      "Check back shortly",
      "Work in progress",
      "Launching soon",
      "Not quite yet",
      "Patience",
      "Good things take time",
      "Crafting pixels",
      "Wiring things up",
      "One moment",
      "Putting it together",
      "Hang tight",
      "On the way",
      "Still cooking",
      "Just around the corner",
      "In the works",
      "Loading",
      "Assembling",
      "Getting there",
      "Bear with me",
      "Coming right up",
      "Tuning things up",
      "Making it happen",
      "New site who dis",
      "4.3 PRs",
    ];

    for (let i = messages.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [messages[i], messages[j]] = [messages[j], messages[i]];
    }

    const el = document.getElementById("status");
    let msgIndex = 0;

    const TYPE_SPEED = 70;
    const PAUSE_AFTER = 2500;
    const DELETE_SPEED = 40;
    const PAUSE_BEFORE = 500;

    function typeMessage() {
      const text = messages[msgIndex];
      let i = 0;

      function typeChar() {
        if (i < text.length) {
          el.textContent = text.slice(0, i + 1);
          i++;
          setTimeout(typeChar, TYPE_SPEED);
        } else {
          setTimeout(deleteMessage, PAUSE_AFTER);
        }
      }

      typeChar();
    }

    function deleteMessage() {
      const text = el.textContent;
      let i = text.length;

      function deleteChar() {
        if (i > 0) {
          i--;
          el.textContent = text.slice(0, i);
          setTimeout(deleteChar, DELETE_SPEED);
        } else {
          msgIndex = (msgIndex + 1) % messages.length;
          setTimeout(typeMessage, PAUSE_BEFORE);
        }
      }

      deleteChar();
    }

    function typeName(callback) {
      const nameEl = document.getElementById("name");
      const name = "Brad Dwyer";
      let i = 0;

      function typeChar() {
        if (i < name.length) {
          nameEl.textContent = name.slice(0, i + 1);
          nameEl.setAttribute("data-text", name.slice(0, i + 1));
          i++;
          const delay = 300 + Math.random() * 1200;
          setTimeout(typeChar, delay);
        } else {
          setTimeout(callback, 800);
        }
      }

      typeChar();
    }

    function wrapChars(nameEl) {
      const text = nameEl.textContent;
      nameEl.textContent = "";
      for (const ch of text) {
        const span = document.createElement("span");
        span.className = "char";
        span.textContent = ch === " " ? "\u00A0" : ch;
        nameEl.appendChild(span);
      }
    }

    function startGlitch() {
      const nameEl = document.getElementById("name");
      const body = document.body;
      const chars = nameEl.querySelectorAll(".char");

      const glitchColors = ["#0ff", "#f0f", "#f00", "#0f0", "#ff0", "#f80"];

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function pickColor() {
        return glitchColors[Math.floor(Math.random() * glitchColors.length)];
      }

      function randomClip() {
        const style = Math.floor(rand(0, 5));
        const a = rand(0, 50), b = rand(50, 100);
        switch (style) {
          case 0: return `inset(${a}% 0 ${100-b}% 0)`;           // horizontal slice
          case 1: return `inset(0 ${100-b}% 0 ${a}%)`;           // vertical slice
          case 2: return `polygon(0 ${a}%, 100% 0, 100% ${b}%, 0 100%)`; // diagonal
          case 3: return `polygon(${a}% 0, 100% ${a}%, ${b}% 100%, 0 ${b}%)`; // skewed quad
          default: return `inset(${a}% ${rand(0,20)}% ${100-b}% ${rand(0,20)}%)`; // inset box
        }
      }

      function glitchChars(intensity) {
        const count = Math.max(1, Math.floor(chars.length * (0.2 + intensity * 0.8)));
        const indices = [];
        while (indices.length < count) {
          const idx = Math.floor(rand(0, chars.length));
          if (!indices.includes(idx)) indices.push(idx);
        }

        for (const idx of indices) {
          const ch = chars[idx];
          const mult = 1 + intensity * 5;

          ch.style.transform = `translate(${rand(-3,3)*mult}px, ${rand(-3,3)*mult}px) skewX(${rand(-10,10)*intensity}deg)`;

          if (Math.random() < 0.4 + intensity * 0.4) {
            ch.style.color = pickColor();
          }
          if (Math.random() < 0.3 + intensity * 0.3) {
            ch.style.textShadow = `${rand(-4,4)*mult}px ${rand(-2,2)*mult}px ${pickColor()}, ${rand(-4,4)*mult}px ${rand(-2,2)*mult}px ${pickColor()}`;
          }
          if (Math.random() < 0.2 * intensity) {
            ch.style.clipPath = randomClip();
            ch.style.webkitClipPath = ch.style.clipPath;
          }
          if (Math.random() < 0.15 * intensity) {
            ch.style.opacity = rand(0, 0.5).toFixed(2);
          }
        }
      }

      function clearChars() {
        for (const ch of chars) {
          ch.style.transform = "";
          ch.style.color = "";
          ch.style.textShadow = "";
          ch.style.clipPath = "";
          ch.style.webkitClipPath = "";
          ch.style.opacity = "";
        }
      }

      function glitchPage(intensity) {
        // even subtle glitches nudge the background
        if (intensity > 0.1) {
          const s = Math.floor(intensity * 20);
          const r = 10 + Math.floor(rand(-1,1) * s);
          const g = 10 + Math.floor(rand(-1,1) * s);
          const b = 10 + Math.floor(rand(-1,1) * s);
          body.style.backgroundColor = `rgb(${Math.max(0,r)}, ${Math.max(0,g)}, ${Math.max(0,b)})`;
        }
        if (intensity > 0.15 && Math.random() < 0.3) {
          body.style.opacity = rand(0.92, 1).toFixed(2);
        }
        if (intensity > 0.4) {
          const angle = rand(0, 180).toFixed(0);
          body.style.backgroundImage = `repeating-linear-gradient(
            ${angle}deg,
            transparent,
            transparent ${rand(2,4).toFixed(0)}px,
            rgba(${Math.random()<0.5?"0,255,255":"255,0,255"}, ${(intensity*0.1).toFixed(2)}) ${rand(2,4).toFixed(0)}px,
            transparent ${rand(4,8).toFixed(0)}px
          )`;
        }
        if (intensity > 0.7) {
          document.querySelector(".center").style.transform =
            `translate(${rand(-10,10).toFixed(1)}px, ${rand(-5,5).toFixed(1)}px) skewX(${rand(-3,3).toFixed(1)}deg)`;
          const statusEl = document.getElementById("status");
          statusEl.style.transform = `translate(${rand(-8,8).toFixed(1)}px, ${rand(-3,3).toFixed(1)}px)`;
          statusEl.style.opacity = Math.random() < 0.3 ? "0.3" : "1";
        }
        if (intensity > 0.85) {
          body.style.filter = `hue-rotate(${rand(-30,30).toFixed(0)}deg) saturate(${rand(1,3).toFixed(1)})`;
          nameEl.style.textShadow = `${rand(-10,10).toFixed(0)}px ${rand(-5,5).toFixed(0)}px ${pickColor()}, ${rand(-10,10).toFixed(0)}px ${rand(-5,5).toFixed(0)}px ${pickColor()}`;
        }
      }

      function clearPage() {
        body.style.backgroundColor = "";
        body.style.backgroundImage = "";
        body.style.filter = "";
        body.style.opacity = "";
        nameEl.style.transform = "";
        nameEl.style.textShadow = "";
        nameEl.style.opacity = "";
        document.querySelector(".center").style.transform = "";
        const statusEl = document.getElementById("status");
        statusEl.style.transform = "";
        statusEl.style.opacity = "";
      }

      function triggerGlitch() {
        const roll = Math.random();
        let intensity;
        if (roll < 0.5) intensity = rand(0, 0.2);
        else if (roll < 0.75) intensity = rand(0.2, 0.5);
        else if (roll < 0.9) intensity = rand(0.5, 0.8);
        else intensity = rand(0.8, 1.0);

        const burstCount = intensity > 0.6
          ? Math.floor(rand(4, 10))
          : (Math.random() < 0.4 ? Math.floor(rand(2, 5)) : 1);
        const frameDuration = rand(30, 80);
        let frame = 0;

        const interval = setInterval(() => {
          if (frame >= burstCount) {
            clearInterval(interval);
            clearChars();
            clearPage();
            return;
          }
          clearChars();
          glitchChars(intensity);
          glitchPage(intensity);

          // whole-name distortion
          if (intensity > 0.3) {
            nameEl.style.transform = `skewX(${rand(-4,4)*(1+intensity*2)}deg) translate(${rand(-3,3)*(1+intensity*3)}px, ${rand(-2,2)*intensity*3}px)`;
          }
          if (Math.random() < 0.2 + intensity * 0.3) {
            nameEl.style.opacity = Math.random() < 0.5 ? "0" : "1";
          }

          frame++;
        }, frameDuration);

        const next = rand(1500, 4000);
        setTimeout(triggerGlitch, next);
      }

      setTimeout(triggerGlitch, rand(1000, 2000));
    }

    typeName(() => {
      const nameEl = document.getElementById("name");
      wrapChars(nameEl);
      startGlitch();
      typeMessage();
    });
  </script>
</body>
</html>
