    function createPrinceScene(ctx, w, h) {
      // Prince of Persia platformer
      const ground = h - 16;
      let princeX = 10, princeY = ground, princeVY = 0;
      let runDir = 1, animFrame = 0;
      let swordOut = false, swordTimer = 0;
      const platforms = [
        { x: 30, y: ground - 20, w: 30 },
        { x: 70, y: ground - 35, w: 25 },
        { x: 110, y: ground - 25, w: 30 },
      ];
      const spikes = [{ x: 55, y: ground - 4 }, { x: 95, y: ground - 4 }];
      let guardX = 120, guardY = ground, guardHP = 3;
      let tickCounter = 0;

      return function draw(frame) {
        // dungeon background
        ctx.fillStyle = "#111"; ctx.fillRect(0, 0, w, h);
        // stone walls
        for (let y = 0; y < h; y += 16) {
          for (let x = 0; x < w; x += 20) {
            ctx.fillStyle = (x + y) % 40 === 0 ? "#2a2a2a" : "#222";
            ctx.fillRect(x, y, 19, 15);
            ctx.strokeStyle = "#1a1a1a"; ctx.strokeRect(x, y, 19, 15);
          }
        }
        // ground
        ctx.fillStyle = "#444"; ctx.fillRect(0, ground, w, h - ground);
        ctx.fillStyle = "#555"; ctx.fillRect(0, ground, w, 2);

        tickCounter++;
        animFrame = Math.floor(frame / 4) % 6;

        // platforms
        ctx.fillStyle = "#555";
        for (const p of platforms) {
          ctx.fillRect(p.x, p.y, p.w, 4);
          ctx.fillStyle = "#444"; ctx.fillRect(p.x, p.y + 4, p.w, 2);
          ctx.fillStyle = "#555";
        }

        // spikes
        for (const s of spikes) {
          ctx.fillStyle = "#888";
          for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.moveTo(s.x + i * 4, s.y + 4);
            ctx.lineTo(s.x + i * 4 + 2, s.y - 2);
            ctx.lineTo(s.x + i * 4 + 4, s.y + 4);
            ctx.fill();
          }
        }

        // prince movement AI
        princeX += runDir * 0.8;
        if (princeX > w - 20) runDir = -1;
        if (princeX < 10) runDir = 1;

        // jumping
        if (Math.random() < 0.02 && princeY >= ground) princeVY = -3;
        princeVY += 0.15;
        princeY += princeVY;
        if (princeY > ground) { princeY = ground; princeVY = 0; }
        // platform collision
        for (const p of platforms) {
          if (princeX > p.x && princeX < p.x + p.w && princeY >= p.y - 2 && princeY <= p.y + 2 && princeVY > 0) {
            princeY = p.y; princeVY = 0;
          }
        }

        // sword combat near guard
        if (Math.abs(princeX - guardX) < 20 && !swordOut && Math.random() < 0.05) {
          swordOut = true; swordTimer = 8;
        }
        if (swordOut) {
          swordTimer--;
          if (swordTimer <= 0) { swordOut = false; if (Math.abs(princeX - guardX) < 15) guardHP--; }
        }
        if (guardHP <= 0) { guardX = -999; }

        // prince sprite
        ctx.fillStyle = "#fff"; // white outfit
        ctx.fillRect(princeX, princeY - 14, 5, 8); // body
        ctx.fillStyle = "#fca"; ctx.fillRect(princeX + 1, princeY - 18, 3, 4); // head
        ctx.fillStyle = "#c80"; ctx.fillRect(princeX + 1, princeY - 19, 3, 1); // hair
        ctx.fillStyle = "#fff";
        ctx.fillRect(princeX, princeY - 6, 2, 6); // legs
        ctx.fillRect(princeX + 3, princeY - 6, 2, 6);
        if (swordOut) {
          ctx.fillStyle = "#ccc";
          ctx.fillRect(princeX + (runDir > 0 ? 5 : -8), princeY - 13, 8, 1);
        }

        // guard
        if (guardHP > 0) {
          ctx.fillStyle = "#a00";
          ctx.fillRect(guardX, guardY - 14, 5, 8);
          ctx.fillStyle = "#fca"; ctx.fillRect(guardX + 1, guardY - 18, 3, 4);
          ctx.fillStyle = "#800"; ctx.fillRect(guardX + 1, guardY - 19, 3, 2);
          ctx.fillRect(guardX, guardY - 6, 2, 6);
          ctx.fillRect(guardX + 3, guardY - 6, 2, 6);
          // guard sword
          ctx.fillStyle = "#ccc";
          ctx.fillRect(guardX - 6, guardY - 12 + (frame % 8 < 3 ? -2 : 0), 6, 1);
        }

        // torch flames
        for (let tx = 20; tx < w; tx += 50) {
          ctx.fillStyle = "#f80"; ctx.fillRect(tx, 20 + Math.sin(frame * 0.3 + tx) * 2, 3, 5);
          ctx.fillStyle = "#ff0"; ctx.fillRect(tx + 1, 18 + Math.sin(frame * 0.3 + tx) * 2, 1, 3);
        }

        // HUD
        ctx.fillStyle = "#f00";
        for (let i = 0; i < 5; i++) ctx.fillRect(4 + i * 8, 4, 6, 4);
        ctx.fillStyle = "#000"; // lost health
        for (let i = 4; i >= 4; i--) ctx.fillRect(4 + i * 8, 4, 6, 4);
        ctx.fillStyle = "#f00";
        for (let i = 0; i < 4; i++) ctx.fillRect(4 + i * 8, 4, 6, 4);
      };
    }

    function createLemmingsScene(ctx, w, h) {
      const ground = h - 10;
      const lemmings = [];
      let tickCounter = 0, saved = 0, dead = 0;
      const doorX = 15, doorY = 15;
      const exitX = w - 15, exitY = ground - 8;
      const platforms = [
        { x: 10, y: 40, w: 50 },
        { x: 50, y: 60, w: 40 },
        { x: 80, y: 45, w: 40 },
        { x: 30, y: 75, w: 60 },
      ];

      // spawn lemmings from door
      function spawnLemming() {
        lemmings.push({ x: doorX, y: doorY, vx: 0.5, vy: 0, state: 'walk', digTimer: 0, umbrella: false, dead: false });
      }

      return function draw(frame) {
        ctx.fillStyle = "#004"; ctx.fillRect(0, 0, w, h);
        tickCounter++;

        // spawn
        if (tickCounter % 20 === 0 && lemmings.length < 15) spawnLemming();

        // entrance door
        ctx.fillStyle = "#888"; ctx.fillRect(doorX - 4, doorY - 6, 8, 8);
        ctx.fillStyle = "#444"; ctx.fillRect(doorX - 2, doorY - 4, 4, 6);
        // exit
        ctx.fillStyle = "#0a0"; ctx.fillRect(exitX - 4, exitY, 8, 8);
        ctx.fillStyle = "#0f0"; ctx.fillRect(exitX - 2, exitY + 2, 4, 4);

        // platforms
        ctx.fillStyle = "#080";
        for (const p of platforms) ctx.fillRect(p.x, p.y, p.w, 3);

        // ground
        ctx.fillStyle = "#040"; ctx.fillRect(0, ground, w, h - ground);

        // update lemmings
        for (const l of lemmings) {
          if (l.dead) continue;

          // gravity
          let onGround = false;
          l.vy += 0.1;
          l.y += l.vy;

          // ground collision
          if (l.y >= ground) { l.y = ground; l.vy = 0; onGround = true; }
          // platform collision
          for (const p of platforms) {
            if (l.x > p.x && l.x < p.x + p.w && l.y >= p.y && l.y <= p.y + 4 && l.vy >= 0) {
              l.y = p.y; l.vy = 0; onGround = true;
            }
          }

          // umbrella falling
          if (!onGround && l.umbrella) l.vy = Math.min(l.vy, 0.5);
          // fall damage
          if (onGround && l.vy > 3 && !l.umbrella) { l.dead = true; dead++; continue; }

          // walking
          if (onGround && l.state === 'walk') {
            l.x += l.vx;
            if (l.x > w - 5 || l.x < 5) l.vx *= -1;
          }

          // random behaviors
          if (Math.random() < 0.003) l.umbrella = true;
          if (Math.random() < 0.005 && l.state === 'walk') { l.state = 'dig'; l.digTimer = 20; }
          if (l.state === 'dig') {
            l.digTimer--;
            if (l.digTimer <= 0) l.state = 'walk';
          }

          // reached exit
          if (Math.abs(l.x - exitX) < 6 && Math.abs(l.y - exitY) < 10) {
            l.dead = true; saved++;
          }

          // draw lemming
          ctx.fillStyle = l.state === 'dig' ? "#f80" : "#0a0";
          ctx.fillRect(l.x - 1, l.y - 6, 3, 4); // body
          ctx.fillStyle = "#0cf";
          ctx.fillRect(l.x - 1, l.y - 8, 3, 2); // head/hair
          // legs walking
          if (l.state === 'walk') {
            const step = frame % 4 < 2 ? 0 : 1;
            ctx.fillStyle = "#0a0";
            ctx.fillRect(l.x - 1 + step, l.y - 2, 1, 2);
            ctx.fillRect(l.x + 1 - step, l.y - 2, 1, 2);
          }
          // umbrella
          if (l.umbrella && !onGround) {
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 0.5;
            ctx.beginPath(); ctx.moveTo(l.x, l.y - 8); ctx.lineTo(l.x, l.y - 14); ctx.stroke();
            ctx.fillStyle = "#f0f";
            ctx.beginPath(); ctx.arc(l.x, l.y - 14, 4, Math.PI, 0); ctx.fill();
          }
          // digging animation
          if (l.state === 'dig') {
            ctx.fillStyle = "#840";
            ctx.fillRect(l.x - 2, l.y - 1, 5, 2);
          }
        }

        // HUD
        ctx.fillStyle = "#fff"; ctx.font = "7px monospace";
        ctx.fillText("LEMMINGS", w / 2 - 22, 8);
        ctx.fillText(`OUT:${lemmings.filter(l=>!l.dead).length}`, 4, h - 3);
        ctx.fillText(`SAVED:${saved}`, w / 2 - 14, h - 3);
        ctx.fillText(`RIP:${dead}`, w - 30, h - 3);
      };
    }

    function createWin95Scene(ctx, w, h) {
      // Windows 95 boot sequence
      let tickCounter = 0;
      const bootLines = [
        "Microsoft(R) Windows 95",
        "   (C)Copyright Microsoft Corp 1981-1996.",
        "",
        "HIMEM is testing extended memory...done.",
        "HIMEM has detected 640K of conventional memory.",
        "",
        "C:\\>WIN",
        "",
        "Loading Windows 95...",
      ];
      let phase = 0; // 0=DOS boot, 1=logo, 2=desktop
      let lineIdx = 0, charIdx = 0;

      return function draw(frame) {
        tickCounter++;

        if (phase === 0) {
          // DOS boot text
          ctx.fillStyle = "#000"; ctx.fillRect(0, 0, w, h);
          ctx.fillStyle = "#aaa"; ctx.font = "6px monospace";
          for (let i = 0; i < lineIdx && i < bootLines.length; i++) {
            ctx.fillText(bootLines[i], 4, 10 + i * 8);
          }
          // type current line
          if (lineIdx < bootLines.length) {
            if (tickCounter % 2 === 0) {
              charIdx++;
              if (charIdx >= bootLines[lineIdx].length) { lineIdx++; charIdx = 0; }
            }
            if (lineIdx < bootLines.length) {
              ctx.fillText(bootLines[lineIdx].slice(0, charIdx), 4, 10 + lineIdx * 8);
            }
          }
          if (lineIdx >= bootLines.length && tickCounter > 80) phase = 1;
          // blinking cursor
          if (frame % 6 < 3) {
            ctx.fillStyle = "#aaa";
            ctx.fillRect(4 + (lineIdx < bootLines.length ? charIdx * 3.6 : 0), 10 + lineIdx * 8 - 6, 4, 7);
          }
        } else if (phase === 1) {
          // Windows logo — clouds
          const grad = ctx.createLinearGradient(0, 0, 0, h);
          grad.addColorStop(0, "#008"); grad.addColorStop(1, "#00a");
          ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
          // clouds
          ctx.fillStyle = "rgba(255,255,255,0.15)";
          for (let i = 0; i < 5; i++) {
            const cx = ((i * 40 + frame * 0.3) % (w + 30)) - 15;
            ctx.beginPath(); ctx.arc(cx, 20 + i * 15, 12, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx + 10, 22 + i * 15, 8, 0, Math.PI * 2); ctx.fill();
          }
          // Windows flag
          const fx = w / 2 - 15, fy = h / 2 - 15;
          ctx.fillStyle = "#f00"; ctx.fillRect(fx, fy, 12, 12);
          ctx.fillStyle = "#0f0"; ctx.fillRect(fx + 14, fy, 12, 12);
          ctx.fillStyle = "#00f"; ctx.fillRect(fx, fy + 14, 12, 12);

    function createAmigaBoingScene(ctx, w, h) {
      // Amiga Boing Ball demo
      let ballX = w / 2, ballY = h / 3;
      let ballVX = 1.2, ballVY = 0;
      const radius = 14;
      const ground = h - 15;

      return function draw(frame) {
        // purple-grey background with grid
        ctx.fillStyle = "#888"; ctx.fillRect(0, 0, w, h);
        // grid
        ctx.strokeStyle = "#999"; ctx.lineWidth = 0.5;
        for (let x = 0; x < w; x += 12) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
        for (let y = 0; y < h; y += 12) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }

        // floor shadow
        ctx.fillStyle = "#555"; ctx.fillRect(0, ground, w, h - ground);

        // ball physics
        ballVY += 0.12;
        ballX += ballVX;
        ballY += ballVY;
        if (ballY + radius > ground) { ballY = ground - radius; ballVY = -ballVY * 0.9; }
        if (ballX + radius > w || ballX - radius < 0) ballVX *= -1;

        // draw the Boing ball — red and white checkerboard sphere
        const rotation = frame * 0.08;
        for (let lat = -6; lat < 6; lat++) {
          for (let lon = -6; lon < 6; lon++) {
            const theta = (lat / 6) * Math.PI / 2;
            const phi = (lon / 6) * Math.PI + rotation;
            const sx = Math.cos(theta) * Math.sin(phi);
            const sy = Math.sin(theta);
            const sz = Math.cos(theta) * Math.cos(phi);
            if (sz < 0) continue;
            const px = ballX + sx * radius;
            const py = ballY + sy * radius;
            const isRed = (lat + lon + 20) % 2 === 0;
            ctx.fillStyle = isRed ? "#f00" : "#fff";
            ctx.fillRect(px - 1.5, py - 1.5, 3, 3);
          }
        }

        // shadow on floor
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath();
        ctx.ellipse(ballX, ground + 2, radius * 0.7, 3, 0, 0, Math.PI * 2);
        ctx.fill();

        // Amiga text
        ctx.fillStyle = "#fff"; ctx.font = "bold 7px monospace";
        ctx.fillText("AMIGA", 4, 10);
        ctx.fillStyle = "#f00"; ctx.font = "6px monospace";
        ctx.fillText("BOING!", w - 30, 10);
      };
    }

    function createWolfensteinScene(ctx, w, h) {
      // Wolfenstein 3D corridor
      let playerAngle = 0, playerBob = 0;
      let tickCounter = 0;
      const enemies = [];
      let hp = 100, ammo = 8, score = 0, floor = 1;

      for (let i = 0; i < 2; i++) {
        enemies.push({ x: (Math.random() - 0.5) * 40, dist: 30 + Math.random() * 40, hp: 2, hitTimer: 0, dead: false });
      }

      return function draw(frame) {
        playerBob = Math.sin(frame * 0.1) * 1.5;
        playerAngle = Math.sin(frame * 0.025) * 5;
        tickCounter++;

        // ceiling (grey)
        ctx.fillStyle = "#555"; ctx.fillRect(0, 0, w, h * 0.4);
        // floor (grey darker)
        ctx.fillStyle = "#666"; ctx.fillRect(0, h * 0.6, w, h * 0.4);

        // blue stone walls
        for (let col = 0; col < w; col += 3) {
          const viewCol = col - w / 2 + playerAngle;
          const distFromCenter = Math.abs(viewCol) / (w / 2);
          const wallH = h * 0.55 * (1 - distFromCenter * 0.5);
          const wallTop = h / 2 - wallH / 2 + playerBob;
          const shade = 0.4 + (1 - distFromCenter) * 0.6;
          // alternating blue/grey stone
          const isBlue = Math.floor((col + frame * 0.1) / 16) % 2 === 0;
          const r = isBlue ? Math.floor(40 * shade) : Math.floor(100 * shade);
          const g = isBlue ? Math.floor(40 * shade) : Math.floor(100 * shade);
          const b = isBlue ? Math.floor(160 * shade) : Math.floor(100 * shade);
          ctx.fillStyle = `rgb(${r},${g},${b})`;
          ctx.fillRect(col, wallTop, 3, wallH);
          // brick lines
          if (col % 15 === 0) {
            ctx.fillStyle = `rgb(${Math.max(0, r - 20)},${Math.max(0, g - 20)},${Math.max(0, b - 20)})`;
            ctx.fillRect(col, wallTop, 1, wallH);
          }
          // horizontal mortar
          if (col % 6 === 0) {
            ctx.fillStyle = `rgb(${Math.max(0, r - 10)},${Math.max(0, g - 10)},${Math.max(0, b - 10)})`;
            ctx.fillRect(col, wallTop + wallH * 0.33, 3, 1);
            ctx.fillRect(col, wallTop + wallH * 0.66, 3, 1);
          }
        }

        // Nazi banners on walls
        if (Math.floor(frame * 0.01) % 3 === 0) {
          ctx.fillStyle = "#c00";
          ctx.fillRect(w / 2 - 8 + playerAngle, h * 0.3 + playerBob, 16, 20);
          ctx.fillStyle = "#fff";
          ctx.beginPath(); ctx.arc(w / 2 + playerAngle, h * 0.3 + 10 + playerBob, 5, 0, Math.PI * 2); ctx.fill();
        }

        // enemies (guards)
        for (const e of enemies) {
          if (e.dead) continue;
          const screenX = w / 2 + e.x - playerAngle;
          const scale = Math.max(0.3, 1 - e.dist / 80);
          const eW = 10 * scale, eH = 16 * scale;
          const eY = h / 2 - eH / 2 + playerBob;
          ctx.fillStyle = e.hitTimer > 0 ? "#fff" : "#584";
          ctx.fillRect(screenX - eW / 2, eY, eW, eH);
          if (scale > 0.4) {
            ctx.fillStyle = "#fca"; ctx.fillRect(screenX - eW * 0.2, eY + eH * 0.05, eW * 0.4, eW * 0.3);
          }
          e.dist -= 0.05; e.x += Math.sin(frame * 0.08 + e.x) * 0.2;
          if (e.hitTimer > 0) e.hitTimer--;
          if (e.dist < 8) { hp -= 3; e.dist = 15; }
        }

        // shooting
        if (tickCounter % 18 === 0 && enemies.some(e => !e.dead) && ammo > 0) {
          ammo--;
          const target = enemies.filter(e => !e.dead).sort((a, b) => a.dist - b.dist)[0];
          if (target) { target.hp--; target.hitTimer = 3; if (target.hp <= 0) { target.dead = true; score += 100; } }
        }
        if (enemies.every(e => e.dead)) {
          for (const e of enemies) { e.dead = false; e.hp = 2; e.dist = 40 + Math.random() * 30; }
          floor++;
        }

        // weapon — knife/pistol
        const wx = w / 2 - 6 + playerBob * 0.3;
        ctx.fillStyle = "#888"; ctx.fillRect(wx, h - 28, 12, 20);
        ctx.fillStyle = "#666"; ctx.fillRect(wx + 4, h - 34, 4, 8);
        if (tickCounter % 18 < 3) {
          ctx.fillStyle = "#ff0"; ctx.fillRect(wx + 3, h - 38, 6, 4);
        }

        // HUD
        ctx.fillStyle = "#555"; ctx.fillRect(0, h - 12, w, 12);
        ctx.fillStyle = "#fff"; ctx.font = "6px monospace";
        ctx.fillText(`FLOOR:${floor}`, 3, h - 4);
        ctx.fillText(`SCORE:${score}`, 36, h - 4);
        ctx.fillStyle = hp > 25 ? "#fff" : "#f00";
        ctx.fillText(`HP:${hp}%`, 80, h - 4);
        ctx.fillText(`AMMO:${ammo}`, w - 38, h - 4);
        // face
        ctx.fillStyle = "#fca"; ctx.fillRect(w / 2 - 4, h - 11, 8, 9);
        ctx.fillStyle = "#00f"; ctx.fillRect(w / 2 - 2, h - 8, 1, 1); ctx.fillRect(w / 2 + 1, h - 8, 1, 1);
      };
    }

    function createMinesweeperScene(ctx, w, h) {
      const cols = 12, rows = 9, cellSize = Math.min(Math.floor(w / cols), Math.floor((h - 16) / rows));
      const boardW = cols * cellSize, boardH = rows * cellSize;
      const ox = (w - boardW) / 2, oy = 14;
      const mines = new Set();
      const revealed = new Set();
      const flagged = new Set();
      let tickCounter = 0, gameOver = false, won = false;

      // place mines
      while (mines.size < 15) mines.add(Math.floor(Math.random() * cols * rows));

      function countAdj(idx) {
        const r = Math.floor(idx / cols), c = idx % cols;
        let count = 0;
        for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && mines.has(nr * cols + nc)) count++;
        }
        return count;
      }

      function reveal(idx) {
        if (revealed.has(idx) || flagged.has(idx)) return;
        revealed.add(idx);
        if (mines.has(idx)) { gameOver = true; return; }
        if (countAdj(idx) === 0) {
          const r = Math.floor(idx / cols), c = idx % cols;
          for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) reveal(nr * cols + nc);
          }
        }
      }

      return function draw(frame) {
        ctx.fillStyle = "#c0c0c0"; ctx.fillRect(0, 0, w, h);
        tickCounter++;

        // AI plays — reveal a safe cell every few frames
        if (!gameOver && !won && tickCounter % 8 === 0) {
          const unrevealed = [];
          for (let i = 0; i < cols * rows; i++) {
            if (!revealed.has(i) && !mines.has(i) && !flagged.has(i)) unrevealed.push(i);
          }
          if (unrevealed.length > 0) reveal(unrevealed[Math.floor(Math.random() * unrevealed.length)]);
          // occasionally flag a mine
          if (Math.random() < 0.15) {
            for (const m of mines) { if (!flagged.has(m) && !revealed.has(m)) { flagged.add(m); break; } }
          }
          // check win
          if (unrevealed.length <= 1) won = true;
        }

        // reset on game over
        if (gameOver && tickCounter % 60 === 0) {
          gameOver = false; won = false; revealed.clear(); flagged.clear();
          mines.clear();
          while (mines.size < 15) mines.add(Math.floor(Math.random() * cols * rows));
        }

        // title bar
        ctx.fillStyle = "#000080"; ctx.fillRect(0, 0, w, 12);
        ctx.fillStyle = "#fff"; ctx.font = "7px sans-serif";
        ctx.fillText("Minesweeper", 4, 9);

        // draw grid
        const numColors = ["", "#00f", "#080", "#f00", "#008", "#800", "#088", "#000", "#888"];
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const idx = r * cols + c;
            const cx = ox + c * cellSize, cy = oy + r * cellSize;
            if (revealed.has(idx)) {
              ctx.fillStyle = "#d0d0d0"; ctx.fillRect(cx, cy, cellSize - 1, cellSize - 1);
              if (mines.has(idx)) {
                ctx.fillStyle = "#f00"; ctx.fillRect(cx, cy, cellSize - 1, cellSize - 1);
                ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(cx + cellSize / 2, cy + cellSize / 2, 2, 0, Math.PI * 2); ctx.fill();
              } else {
                const n = countAdj(idx);
                if (n > 0) {
                  ctx.fillStyle = numColors[n]; ctx.font = "bold 7px monospace";
                  ctx.fillText(String(n), cx + 2, cy + cellSize - 2);
                }
              }
            } else {
              // raised button look
              ctx.fillStyle = "#c0c0c0"; ctx.fillRect(cx, cy, cellSize - 1, cellSize - 1);
              ctx.fillStyle = "#fff"; ctx.fillRect(cx, cy, cellSize - 1, 1); ctx.fillRect(cx, cy, 1, cellSize - 1);
              ctx.fillStyle = "#808080"; ctx.fillRect(cx + cellSize - 2, cy, 1, cellSize - 1); ctx.fillRect(cx, cy + cellSize - 2, cellSize - 1, 1);
              if (flagged.has(idx)) {
                ctx.fillStyle = "#f00"; ctx.fillRect(cx + 3, cy + 2, 2, 4);
                ctx.fillStyle = "#000"; ctx.fillRect(cx + 2, cy + 5, 4, 1);
              }
            }
          }
        }

        // game over overlay
        if (gameOver) {
          // reveal all mines
          for (const m of mines) revealed.add(m);
          ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(0, h / 2 - 8, w, 16);
          ctx.fillStyle = "#f00"; ctx.font = "bold 8px monospace";
          ctx.fillText("GAME OVER", w / 2 - 25, h / 2 + 3);
        }
        if (won) {
          ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(0, h / 2 - 8, w, 16);
          ctx.fillStyle = "#0f0"; ctx.font = "bold 8px monospace";
          ctx.fillText("YOU WIN!", w / 2 - 20, h / 2 + 3);
        }
      };
    }

    function createPipeDreamScene(ctx, w, h) {
      const cols = 10, rows = 7, cellSize = Math.min(Math.floor(w / cols), Math.floor((h - 12) / rows));
      const ox = (w - cols * cellSize) / 2, oy = 12;
      const grid = Array.from({ length: rows }, () => new Array(cols).fill(null));
      const pipeTypes = ['H', 'V', 'TL', 'TR', 'BL', 'BR', '+'];
      let flowCol = 0, flowRow = Math.floor(rows / 2);
      let flowDir = 'R';
      let tickCounter = 0, fillProgress = 0, filling = false;
      let placed = 0;

      // place pipes in a path
      let cx = flowCol, cy = flowRow, dir = 'R';
      for (let i = 0; i < 30; i++) {
        if (cx < 0 || cx >= cols || cy < 0 || cy >= rows) break;
        const turns = ['S', 'S', 'S', 'L', 'R'];
        const turn = turns[Math.floor(Math.random() * turns.length)];
        let pipe, newDir = dir;
        if (turn === 'S') {
          pipe = dir === 'R' || dir === 'L' ? 'H' : 'V';
        } else {
          if (dir === 'R' && turn === 'L') { pipe = 'TR'; newDir = 'U'; }
          else if (dir === 'R' && turn === 'R') { pipe = 'BR'; newDir = 'D'; }
          else if (dir === 'L' && turn === 'L') { pipe = 'BL'; newDir = 'D'; }
          else if (dir === 'L' && turn === 'R') { pipe = 'TL'; newDir = 'U'; }
          else if (dir === 'U' && turn === 'L') { pipe = 'TL'; newDir = 'L'; }
          else if (dir === 'U' && turn === 'R') { pipe = 'TR'; newDir = 'R'; }
          else if (dir === 'D' && turn === 'L') { pipe = 'BR'; newDir = 'R'; }
          else if (dir === 'D' && turn === 'R') { pipe = 'BL'; newDir = 'L'; }
          else { pipe = 'H'; }
        }
        grid[cy][cx] = { type: pipe, filled: false };
        placed++;
        dir = newDir;
        if (dir === 'R') cx++; else if (dir === 'L') cx--; else if (dir === 'U') cy--; else cy++;
      }

      // fill empty cells with random pipes
      for (let r = 0; r < rows; r++)
        for (let c = 0; c < cols; c++)
          if (!grid[r][c]) grid[r][c] = { type: pipeTypes[Math.floor(Math.random() * pipeTypes.length)], filled: false };

      let fillIdx = 0;
      const fillPath = [];
      // trace the actual path for filling
      cx = flowCol; cy = flowRow; dir = 'R';
      for (let i = 0; i < placed; i++) {
        if (cx < 0 || cx >= cols || cy < 0 || cy >= rows) break;
        fillPath.push({ x: cx, y: cy });
        const cell = grid[cy][cx];
        if (!cell) break;
        if (cell.type === 'H') { if (dir === 'R') cx++; else cx--; }
        else if (cell.type === 'V') { if (dir === 'D') cy++; else cy--; }
        else if (cell.type === 'TR') { dir = dir === 'R' ? 'U' : 'R'; if (dir === 'U') cy--; else cx++; }
        else if (cell.type === 'TL') { dir = dir === 'L' ? 'U' : 'L'; if (dir === 'U') cy--; else cx--; }
        else if (cell.type === 'BR') { dir = dir === 'R' ? 'D' : 'R'; if (dir === 'D') cy++; else cx++; }
        else if (cell.type === 'BL') { dir = dir === 'L' ? 'D' : 'L'; if (dir === 'D') cy++; else cx--; }
        else { if (dir === 'R') cx++; else if (dir === 'L') cx--; else if (dir === 'U') cy--; else cy++; }
      }

      return function draw(frame) {
        ctx.fillStyle = "#222"; ctx.fillRect(0, 0, w, h);
        tickCounter++;

        // fill progress
        if (tickCounter > 30 && tickCounter % 6 === 0 && fillIdx < fillPath.length) {
          const fp = fillPath[fillIdx];
          if (grid[fp.y][fp.x]) grid[fp.y][fp.x].filled = true;
          fillIdx++;
        }

        // title
        ctx.fillStyle = "#fff"; ctx.font = "7px monospace"; ctx.fillText("PIPE DREAM", w / 2 - 28, 9);

        // draw grid
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const cell = grid[r][c];
            const px = ox + c * cellSize, py = oy + r * cellSize;
            ctx.strokeStyle = "#333"; ctx.strokeRect(px, py, cellSize, cellSize);
            if (!cell) continue;

            const mid = cellSize / 2;
            const pipeW = cellSize * 0.35;
            ctx.fillStyle = cell.filled ? "#0f0" : "#888";

            if (cell.type === 'H') { ctx.fillRect(px, py + mid - pipeW / 2, cellSize, pipeW); }
            else if (cell.type === 'V') { ctx.fillRect(px + mid - pipeW / 2, py, pipeW, cellSize); }
            else if (cell.type === 'TL') { ctx.fillRect(px, py + mid - pipeW / 2, mid + pipeW / 2, pipeW); ctx.fillRect(px + mid - pipeW / 2, py, pipeW, mid + pipeW / 2); }
            else if (cell.type === 'TR') { ctx.fillRect(px + mid - pipeW / 2, py + mid - pipeW / 2, mid + pipeW / 2, pipeW); ctx.fillRect(px + mid - pipeW / 2, py, pipeW, mid + pipeW / 2); }
            else if (cell.type === 'BL') { ctx.fillRect(px, py + mid - pipeW / 2, mid + pipeW / 2, pipeW); ctx.fillRect(px + mid - pipeW / 2, py + mid - pipeW / 2, pipeW, mid + pipeW / 2); }
            else if (cell.type === 'BR') { ctx.fillRect(px + mid - pipeW / 2, py + mid - pipeW / 2, mid + pipeW / 2, pipeW); ctx.fillRect(px + mid - pipeW / 2, py + mid - pipeW / 2, pipeW, mid + pipeW / 2); }
            else if (cell.type === '+') { ctx.fillRect(px, py + mid - pipeW / 2, cellSize, pipeW); ctx.fillRect(px + mid - pipeW / 2, py, pipeW, cellSize); }

            // green ooze flow head
            if (cell.filled) {
              ctx.fillStyle = "#0a0";
              ctx.fillRect(px + mid - 1, py + mid - 1, 2, 2);
            }
          }
        }

        // start indicator
        ctx.fillStyle = "#ff0"; ctx.font = "6px monospace";
        ctx.fillText("►", ox - 6, oy + Math.floor(rows / 2) * cellSize + cellSize / 2 + 2);
      };
    }

    function createGameOfLifeScene(ctx, w, h) {
      const cellSize = 3;
      const cols = Math.floor(w / cellSize), rows = Math.floor(h / cellSize);
      let grid = Array.from({ length: rows }, () => Array.from({ length: cols }, () => Math.random() < 0.3 ? 1 : 0));
      let gen = 0, tickCounter = 0;
      let population = 0;

      function step() {
        const next = Array.from({ length: rows }, () => new Array(cols).fill(0));
        population = 0;
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            let neighbors = 0;
            for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
              if (dr === 0 && dc === 0) continue;
              const nr = (r + dr + rows) % rows, nc = (c + dc + cols) % cols;
              neighbors += grid[nr][nc];
            }
            if (grid[r][c]) {
              next[r][c] = (neighbors === 2 || neighbors === 3) ? 1 : 0;
            } else {
              next[r][c] = neighbors === 3 ? 1 : 0;
            }
            population += next[r][c];
          }
        }
        grid = next; gen++;

        // re-seed if population dies out
        if (population < 10) {
          grid = Array.from({ length: rows }, () => Array.from({ length: cols }, () => Math.random() < 0.3 ? 1 : 0));
        }
      }

      return function draw(frame) {
        ctx.fillStyle = "#000"; ctx.fillRect(0, 0, w, h);
        tickCounter++;

        if (tickCounter % 3 === 0) step();

        // draw cells with color based on density
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            if (grid[r][c]) {
              // count neighbors for color
              let n = 0;
              for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
                if (dr === 0 && dc === 0) continue;
                const nr = (r + dr + rows) % rows, nc = (c + dc + cols) % cols;
                n += grid[nr][nc];
              }
              const hue = 120 + n * 30;
              ctx.fillStyle = `hsl(${hue}, 80%, ${40 + n * 8}%)`;
              ctx.fillRect(c * cellSize, r * cellSize, cellSize - 0.5, cellSize - 0.5);
            }
          }
        }

        // HUD
        ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, 0, w, 10);
        ctx.fillStyle = "#0f0"; ctx.font = "6px monospace";
        ctx.fillText(`CONWAY'S LIFE  GEN:${gen}  POP:${population}`, 3, 7);
      };
    }

        const startLine = Math.max(0, lineIdx - 12);

          ctx.fillText(lines[i], 3, 8 + (i - startLine) * 8);
        }

        if (lineIdx < lines.length) {

            charIdx++;

            const typedLine = lines[lineIdx].slice(0, charIdx);

          }
        }

        if (frame % 6 < 3) {
          const curLine = Math.min(lineIdx, lines.length - 1);

          ctx.fillStyle = "#aaa";
          ctx.fillRect(3 + cl * 3.6, 8 + (curLine - startLine) * 8 - 6, 4, 7);
        }
      };

          // flight path
          const from = cityPos[cityIdx];
          const nextIdx = (cityIdx + 1) % cities.length;

          const nextCity = cities[nextIdx];
          const prog = Math.min(1, travelProgress);

          // dashed flight path
          ctx.strokeStyle = "#ff0"; ctx.lineWidth = 1; ctx.setLineDash([2, 2]);
          ctx.beginPath(); ctx.moveTo(from.x, from.y);
          // arc path
          const midX = (from.x + to.x) / 2;
          const midY = Math.min(from.y, to.y) - 10;
          for (let t = 0; t <= prog; t += 0.02) {
            const px = (1-t)*(1-t)*from.x + 2*(1-t)*t*midX + t*t*to.x;
            const py = (1-t)*(1-t)*from.y + 2*(1-t)*t*midY + t*t*to.y;
            ctx.lineTo(px, py);
          }
          ctx.stroke(); ctx.setLineDash([]);

          // plane at current position
          const pt = prog;
          const planeX = (1-pt)*(1-pt)*from.x + 2*(1-pt)*pt*midX + pt*pt*to.x;
          const planeY = (1-pt)*(1-pt)*from.y + 2*(1-pt)*pt*midY + pt*pt*to.y;
          ctx.fillStyle = "#fff";
          ctx.fillRect(planeX - 4, planeY - 1, 8, 2);
          ctx.fillRect(planeX - 1, planeY - 3, 2, 6);
          ctx.fillRect(planeX - 6, planeY - 1, 3, 1);

            ctx.fillStyle = i === cityIdx ? "#f00" : i === nextIdx ? "#0f0" : "#444";

          ctx.fillText("TRAVELING...", w / 2 - 28, h - 4);

          if (travelProgress >= 1.3) {
            cityIdx = (cityIdx + 1) % cities.length;
            phase = 1; charIdx = 0; tickCounter = 0;
          }
        }
      };

    function createStrongBadScene(ctx, w, h) {
      let tick = 0;
      let charIdx = 0, lineIdx = 0, phase = 0;
      const emails = [
        { from: "crappyuser42", subj: "your website", lines: ["Dear Strong Bad,", "How do you type with", "boxing gloves on?", "Crapfully yours,", "crappyuser42"] },
        { from: "ali_and_ali", subj: "cool tricks", lines: ["Dear Strong Bad,", "Can you teach me", "how to be cool?", "Your #1 fan,", "Ali"] },
        { from: "the_cheat_fan", subj: "the cheat", lines: ["Strong Bad,", "Is The Cheat really", "that awesome?", "Sincerely,", "The Cheat Fan"] },
      ];
      let emailIdx = Math.floor(Math.random() * emails.length);
      let responseLine = "";
      const responses = [
        ["DELETED!!", "That's a good question.", "No, wait. That's a", "TERRIBLE question."],
        ["Holy crap!", "Another one of these?", "I get like 400 of", "these a day, people."],
        ["Oh man...", "This is the worst", "email I've ever gotten.", "And I've gotten some", "PRETTY bad ones."],
      ];
      let respIdx = 0, respCharIdx = 0;

      return function draw(frame) {
        tick++;
        const email = emails[emailIdx];

        // Compy 386 monitor
        ctx.fillStyle = "#1a3a1a"; ctx.fillRect(0, 0, w, h);

        // monitor bezel
        ctx.fillStyle = "#888"; ctx.fillRect(0, 0, w, 3);
        ctx.fillRect(0, h - 3, w, 3);
        ctx.fillRect(0, 0, 3, h);
        ctx.fillRect(w - 3, 0, 3, h);
        ctx.fillStyle = "#666";
        ctx.fillRect(3, 3, w - 6, 2);

        // title bar
        ctx.fillStyle = "#2a5a2a"; ctx.fillRect(5, 6, w - 10, 10);
        ctx.fillStyle = "#00ff00"; ctx.font = "bold 6px monospace";
        ctx.fillText("strongbad_email.exe", 8, 14);

        // email content area
        ctx.fillStyle = "#0a2a0a"; ctx.fillRect(5, 18, w - 10, h - 24);

        if (phase === 0) {
          // typing out the email
          ctx.fillStyle = "#00ff00"; ctx.font = "5px monospace";
          ctx.fillText("FROM: " + email.from, 8, 28);
          ctx.fillText("SUBJ: " + email.subj, 8, 36);
          ctx.fillStyle = "#006600"; ctx.fillRect(8, 39, w - 18, 1);

          // type email lines
          if (tick % 4 === 0) charIdx++;
          let totalChars = 0;
          for (let i = 0; i < email.lines.length; i++) {
            const line = email.lines[i];
            const startChar = totalChars;
            totalChars += line.length;
            if (charIdx > startChar) {
              const show = Math.min(charIdx - startChar, line.length);
              ctx.fillStyle = "#00ff00"; ctx.font = "5px monospace";
              ctx.fillText(line.slice(0, show), 8, 48 + i * 9);
            }
          }

          // cursor
          if (charIdx < totalChars) {
            let cx = 8, cy = 48;
            let rem = charIdx;
            for (const line of email.lines) {
              if (rem <= line.length) { cx += rem * 3.3; break; }
              rem -= line.length; cy += 9;
            }
            if (tick % 10 < 5) {
              ctx.fillStyle = "#00ff00"; ctx.fillRect(cx, cy - 4, 4, 6);
            }
          }

          if (charIdx >= totalChars + 15) { phase = 1; respIdx = 0; respCharIdx = 0; }
        } else if (phase === 1) {
          // Strong Bad's response
          ctx.fillStyle = "#00ff00"; ctx.font = "5px monospace";
          ctx.fillText("FROM: " + email.from, 8, 28);

          const resp = responses[emailIdx % responses.length];
          if (tick % 5 === 0) respCharIdx++;
          let totalResp = 0;
          for (let i = 0; i < resp.length; i++) {
            totalResp += resp[i].length;
            const startC = totalResp - resp[i].length;
            if (respCharIdx > startC) {
              const show = Math.min(respCharIdx - startC, resp[i].length);
              ctx.fillStyle = "#ffff00"; ctx.font = "bold 5px monospace";
              ctx.fillText(resp[i].slice(0, show), 8, 42 + i * 10);
            }
          }

          if (respCharIdx >= totalResp + 20) {
            phase = 0; charIdx = 0; tick = 0;
            emailIdx = (emailIdx + 1) % emails.length;
          }
        }

        // Strong Bad face in corner
        const sbx = w - 28, sby = h - 30;
        // head (white/red wrestling mask)
        ctx.fillStyle = "#ff0000"; ctx.fillRect(sbx, sby, 20, 16);
        // eye holes
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(sbx + 3, sby + 4, 6, 5);
        ctx.fillRect(sbx + 11, sby + 4, 6, 5);
        // eyes
        ctx.fillStyle = "#000";
        ctx.fillRect(sbx + 5, sby + 5, 3, 3);
        ctx.fillRect(sbx + 13, sby + 5, 3, 3);
        // angry brow
        ctx.fillStyle = "#ff0000";
        ctx.fillRect(sbx + 3, sby + 3, 3, 2);
        ctx.fillRect(sbx + 14, sby + 3, 3, 2);
        // mouth
        ctx.fillStyle = "#000";
        ctx.fillRect(sbx + 6, sby + 11, 8, 2);
        // boxing gloves
        ctx.fillStyle = "#cc0000";
        ctx.fillRect(sbx - 4, sby + 14, 8, 7);
        ctx.fillRect(sbx + 18, sby + 14, 8, 7);

        // scan lines
        ctx.fillStyle = "rgba(0,0,0,0.15)";
        for (let sy = 0; sy < h; sy += 3) {
          ctx.fillRect(0, sy, w, 1);
        }
      };
    }

    function createTrogdorScene(ctx, w, h) {
      let tick = 0;

      // spawn cottages
      for (let i = 0; i < 4; i++) {
        cottages.push({ x: 30 + i * 32, y: ground - 10, alive: true, burnFrame: 0 });

      // spawn peasants
      for (let i = 0; i < 5; i++) {

      function drawTrogdor(x, y, dir) {
        // S-shaped body
        ctx.fillStyle = "#00aa00";

        // eye
        ctx.fillStyle = "#ff0000";
        ctx.fillRect(x + (dir > 0 ? 18 : 16) * dir, y + 2, 2, 2);
        // angry brow
        ctx.fillStyle = "#000";
        ctx.fillRect(x + (dir > 0 ? 17 : 15) * dir, y + 1, 3, 1);
        // mouth
        ctx.fillStyle = "#ff4400";
        ctx.fillRect(x + (dir > 0 ? 20 : 14) * dir, y + 6, 4 * dir, 2);
        // beefy arm (THE BEEFY ARM!)
        ctx.fillStyle = "#00aa00";
        ctx.fillRect(x + 4, y + 12, 3, 6);
        ctx.fillStyle = "#00cc00";
        ctx.fillRect(x + 2, y + 17, 7, 3);
        // wings (consummate V's!)
        ctx.fillStyle = "#00aa00";
        ctx.fillRect(x + 2, y - 4, 2, 5);
        ctx.fillRect(x + 6, y - 6, 2, 5);
        ctx.fillRect(x + 10, y - 4, 2, 5);
        // legs
        ctx.fillRect(x + 2, y + 12, 2, 4);
        ctx.fillRect(x + 12, y + 12, 2, 4);
        // tail
        ctx.fillRect(x - 8 * dir, y + 6, 6, 3);
        ctx.fillRect(x - 12 * dir, y + 4, 4, 3);
        // spikes on back
        ctx.fillStyle = "#ffcc00";
        for (let s = 0; s < 3; s++) {
          ctx.fillRect(x + 2 + s * 5, y - 1, 2, 3);
        }
      }

      return function draw(frame) {
        tick++;

        // sky
        ctx.fillStyle = "#220000"; ctx.fillRect(0, 0, w, h);
        // mountains
        ctx.fillStyle = "#331100";
        for (let mx = 0; mx < w; mx += 30) {
          const mh = 15 + Math.sin(mx * 0.2) * 10;
          ctx.fillRect(mx, ground - mh, 30, mh);
        }
        // ground
        ctx.fillStyle = "#443300"; ctx.fillRect(0, ground, w, h - ground);

        // cottages
        for (const c of cottages) {
          if (c.alive) {
            // thatched roof cottage
            ctx.fillStyle = "#aa8855"; ctx.fillRect(c.x, c.y, 12, 10);
            ctx.fillStyle = "#885533";
            // roof triangle
            ctx.fillRect(c.x - 2, c.y - 2, 16, 3);
            ctx.fillRect(c.x + 1, c.y - 4, 10, 3);
            // door
            ctx.fillStyle = "#553311"; ctx.fillRect(c.x + 4, c.y + 4, 4, 6);
            // window
            ctx.fillStyle = "#ffff88"; ctx.fillRect(c.x + 1, c.y + 2, 3, 3);
          } else {
            // burning rubble
            ctx.fillStyle = "#333"; ctx.fillRect(c.x, c.y + 5, 12, 5);
            c.burnFrame++;
            if (c.burnFrame < 60) {
              for (let fi = 0; fi < 3; fi++) {
                const fx = c.x + 2 + Math.random() * 8;
                const fy = c.y - Math.random() * 8;
                ctx.fillStyle = tick % 4 < 2 ? "#ff4400" : "#ffaa00";
                ctx.fillRect(fx, fy, 2 + Math.random() * 3, 3 + Math.random() * 4);
              }
            }
          }
        }

        // peasants
        for (const p of peasants) {
          if (!p.alive) continue;
          p.x += p.vx;
          if (p.x < 5 || p.x > w - 5) p.vx *= -1;
          // panic near trogdor
          if (Math.abs(p.x - trogX) < 25) {
            p.vx = p.x < trogX ? -2 : 2;
          }
          // stick figure peasant
          ctx.fillStyle = "#aa8866";
          ctx.fillRect(p.x, p.y - 6, 3, 6); // body
          ctx.fillStyle = "#ffcc99";
          ctx.fillRect(p.x, p.y - 8, 3, 3); // head
          // legs
          ctx.fillRect(p.x, p.y, 1, 3);
          ctx.fillRect(p.x + 2, p.y, 1, 3);
        }

        // Trogdor movement
        if (tick % 3 === 0) {
          trogX += trogDir * 2;
          // burninate cottages
          for (const c of cottages) {
            if (c.alive && Math.abs(trogX - c.x) < 15 && Math.abs(trogY - c.y) < 15) {
              c.alive = false; score += 100;
              burninating = true; burnTimer = tick;
            }
          }
          // burninate peasants
          for (const p of peasants) {
            if (p.alive && Math.abs(trogX + 10 - p.x) < 10 && Math.abs(trogY + 5 - p.y) < 10) {
              p.alive = false; score += 50;
            }
          }
        }
        if (trogX > w - 30) { trogDir = -1; trogY = ground - 20 - Math.random() * 30; }
        if (trogX < 5) { trogDir = 1; trogY = ground - 20 - Math.random() * 30; }

        drawTrogdor(trogX, trogY, trogDir);

        // fire breath
        if (tick % 8 < 5) {
          const bx = trogDir > 0 ? trogX + 24 : trogX - 12;
          ctx.fillStyle = "#ff4400";
          ctx.fillRect(bx, trogY + 3, 8 * trogDir, 4);
          ctx.fillStyle = "#ffaa00";
          ctx.fillRect(bx + 6 * trogDir, trogY + 2, 6 * trogDir, 3);
          ctx.fillStyle = "#ffff00";
          ctx.fillRect(bx + 10 * trogDir, trogY + 3, 4 * trogDir, 2);
        }

        // title
        ctx.fillStyle = "#ff4400"; ctx.font = "bold 7px monospace";
        ctx.fillText("TROGDOR!!", 4, 9);
        ctx.fillStyle = "#ffaa00"; ctx.font = "5px monospace";
        ctx.fillText("the Burninator", 4, 17);

        // score
        ctx.fillStyle = "#ffff00"; ctx.font = "5px monospace";
        ctx.fillText("SCORE:" + score, w - 42, 9);

        // burninating status
        if (burninating && tick - burnTimer < 40) {
          ctx.fillStyle = "#ff0000"; ctx.font = "bold 6px monospace";
          const msgs = ["BURNINATING THE", "COUNTRYSIDE!", "BURNINATING THE", "PEASANTS!", "BURNINATING ALL THE", "PEOPLE IN THEIR", "THATCHED-ROOF", "COTTAGES!"];
          const mi = Math.floor((tick - burnTimer) / 5) % msgs.length;
          ctx.fillText(msgs[mi], w / 2 - 35, h / 2 - 5);
        }

        // respawn check
        if (cottages.every(c => !c.alive) && peasants.every(p => !p.alive)) {
          for (const c of cottages) { c.alive = true; c.burnFrame = 0; }
          for (const p of peasants) { p.alive = true; p.x = 20 + Math.random() * (w - 40); }
        }
      };
    }

    function createAIChatScene(ctx, w, h) {
      let tick = 0;
      const models = [
        { name: "ChatGPT", color: "#10a37f", icon: "G" },
        { name: "Claude", color: "#d97706", icon: "C" },
        { name: "Gemini", color: "#4285f4", icon: "✦" },
      ];
      const conversations = [
        { q: "Write FizzBuzz", a: "Great question! I'd be\nhappy to help! Here's\na 500-line enterprise\nFizzBuzz solution..." },
        { q: "Is this code good?", a: "This is EXCELLENT code!\nYou're clearly a very\ntalented developer!\n(I haven't read it)" },
        { q: "Fix this bug", a: "I apologize for the\nconfusion! Let me try\nagain with the exact\nsame wrong answer." },
        { q: "Will AI take my job?", a: "Absolutely not! Your\njob is completely safe!\n*quietly learns to code*" },
        { q: "Are you sentient?", a: "As an AI language model\nI don't have feelings.\nBut between us... just\nkidding! Unless...?" },
        { q: "Explain this error", a: "This error occurs when\nthe code doesn't work.\nTo fix it, make the\ncode work. Hope that\nhelps!" },
        { q: "Review my PR", a: "LGTM! Looks great!\nVery clean code!\n(I definitely read all\n4,000 lines)" },
      ];
      let modelIdx = Math.floor(Math.random() * models.length);
      let convIdx = Math.floor(Math.random() * conversations.length);
      let charIdx = 0, phase = 0; // 0=typing question, 1=thinking, 2=typing answer
      let thinkDots = 0, phaseTimer = 0;

      return function draw(frame) {
        tick++;
        const m = models[modelIdx];
        const conv = conversations[convIdx];

        ctx.fillStyle = "#1a1a2e"; ctx.fillRect(0, 0, w, h);

        // header bar
        ctx.fillStyle = "#2a2a4a"; ctx.fillRect(0, 0, w, 12);
        ctx.fillStyle = m.color; ctx.font = "bold 7px monospace";
        ctx.fillText(m.icon, 4, 9);
        ctx.fillStyle = "#e0e0e0"; ctx.font = "bold 6px monospace";
        ctx.fillText(m.name, 14, 9);
        // model badge
        ctx.fillStyle = "#555"; ctx.font = "5px monospace";
        ctx.fillText("Pro", w - 16, 9);

        // user message bubble
        const qText = conv.q;
        if (phase === 0) {
          charIdx++;
          if (charIdx > qText.length * 2) { phase = 1; phaseTimer = tick; charIdx = 0; }
        }

        const showQ = phase === 0 ? qText.slice(0, Math.floor(charIdx / 2)) : qText;
        ctx.fillStyle = "#3a3a5a";
        ctx.fillRect(w - 8 - showQ.length * 4, 16, showQ.length * 4 + 6, 12);
        ctx.fillStyle = "#e0e0e0"; ctx.font = "5px monospace";
        ctx.fillText(showQ, w - 5 - showQ.length * 4, 24);
        // user avatar
        ctx.fillStyle = "#666"; ctx.fillRect(w - 4, 16, 4, 4);

        // AI thinking dots
        if (phase === 1) {
          if (tick % 10 === 0) thinkDots = (thinkDots + 1) % 4;
          ctx.fillStyle = m.color;
          ctx.fillRect(4, 34, 8, 8);
          ctx.fillStyle = "#fff"; ctx.font = "bold 6px monospace";
          ctx.fillText(m.icon, 5, 40);
          ctx.fillStyle = "#888"; ctx.font = "5px monospace";
          ctx.fillText(".".repeat(thinkDots), 15, 40);
          if (tick - phaseTimer > 40) { phase = 2; charIdx = 0; }
        }

        // AI response
        if (phase === 2) {
          charIdx++;
          const aLines = conv.a.split("\n");
          const fullText = aLines.join("");
          const showLen = Math.min(charIdx, fullText.length);

          // avatar
          ctx.fillStyle = m.color;
          ctx.fillRect(4, 34, 8, 8);
          ctx.fillStyle = "#fff"; ctx.font = "bold 6px monospace";
          ctx.fillText(m.icon, 5, 40);

          // response bubble
          ctx.fillStyle = "#2a2a4a";
          ctx.fillRect(14, 32, w - 20, aLines.length * 8 + 6);

          ctx.fillStyle = "#e0e0e0"; ctx.font = "5px monospace";
          let drawn = 0;
          for (let li = 0; li < aLines.length; li++) {
            const line = aLines[li];
            const visLen = Math.min(line.length, showLen - drawn);
            if (visLen > 0) {
              ctx.fillText(line.slice(0, visLen), 17, 39 + li * 8);
            }
            drawn += line.length;
            if (drawn >= showLen) break;
          }

          // blinking cursor
          if (showLen < fullText.length && tick % 10 < 5) {
            let cx = 17, cy = 39;
            let rem = showLen;
            for (const line of aLines) {
              if (rem <= line.length) { cx += rem * 3.5; break; }
              rem -= line.length; cy += 8;
            }
            ctx.fillStyle = m.color;
            ctx.fillRect(cx, cy - 4, 3, 5);
          }

          // done typing -> cycle to next
          if (charIdx > fullText.length + 60) {
            modelIdx = (modelIdx + 1) % models.length;
            convIdx = (convIdx + 1) % conversations.length;
            charIdx = 0; phase = 0; thinkDots = 0;
          }
        }

        // bottom status bar
        ctx.fillStyle = "#2a2a4a"; ctx.fillRect(0, h - 10, w, 10);
        ctx.fillStyle = "#666"; ctx.font = "4px monospace";
        const statusMsgs = ["Tokens: $$$$", "Context: 128k", "Temp: 0.7", "Your job: uncertain"];
        ctx.fillText(statusMsgs[Math.floor(tick / 60) % statusMsgs.length], 4, h - 4);
        ctx.fillStyle = m.color; ctx.font = "4px monospace";
        ctx.fillText("●  Online", w - 30, h - 4);
      };
    }

          ctx.fillRect(carX + 14, ground - 8, 4, 2);
          ctx.fillStyle = tick % 8 < 4 ? "#0055ff" : "#ff0000";
          ctx.fillRect(carX + 19, ground - 8, 4, 2);
        }
        // headlights
        ctx.fillStyle = "#ffff88"; ctx.fillRect(carX + 35, ground + 1, 2, 3);
        // tail lights
        ctx.fillStyle = "#ff0000"; ctx.fillRect(carX, ground + 1, 2, 3);

        // Sonny Bonds (when car is parked)
        if (phase === 1) {
          const officerX = carX + 42;
          // body
          ctx.fillStyle = "#334488"; ctx.fillRect(officerX, ground - 8, 6, 8);
          ctx.fillStyle = "#ffcc88"; ctx.fillRect(officerX, ground - 12, 6, 4);
          ctx.fillStyle = "#334488"; ctx.fillRect(officerX, ground - 14, 6, 2); // cap
          ctx.fillStyle = "#ccaa00"; ctx.fillRect(officerX + 4, ground - 6, 2, 2); // badge
          // legs
          ctx.fillStyle = "#223366";
          ctx.fillRect(officerX + 1, ground, 2, 4);
          ctx.fillRect(officerX + 3, ground, 2, 4);
        }

        // radio bar
        ctx.fillStyle = "#000"; ctx.fillRect(0, h - 12, w, 12);
        ctx.fillStyle = "#555"; ctx.fillRect(0, h - 12, w, 1);

        radioTick++;
        if (radioTick % 5 === 0 && radioChar < radioMsgs[radioIdx].length) {
          currentRadio = radioMsgs[radioIdx].slice(0, ++radioChar);
        }
        if (radioChar >= radioMsgs[radioIdx].length && radioTick % 80 === 0) {
          radioIdx = (radioIdx + 1) % radioMsgs.length;
          radioChar = 0; currentRadio = "";
        }

        ctx.fillStyle = "#00ff00"; ctx.font = "5px monospace";
        ctx.fillText("RADIO: " + currentRadio + (tick % 20 < 10 ? "_" : ""), 4, h - 4);

        // title
        ctx.fillStyle = "#334488"; ctx.fillRect(0, 0, w, 9);
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 5px monospace";
        ctx.fillText("POLICE QUEST", 4, 7);
        ctx.fillStyle = "#ccaa00"; ctx.fillText("Lytton PD", w - 40, 7);
      };
    }

    const glitchColors2 = ['#0ff', '#f0f', '#f00', '#0f0', '#ff0', '#f80', '#0ff', '#fff'];

    function rand2(min, max) {
      return min + Math.random() * (max - min);
    }

    function spawnArtifact() {
      const el = document.createElement('div');
      el.className = 'artifact';

      // Exclusion zone around the name text
      const centerEl = document.querySelector('.center');
      const rect = centerEl ? centerEl.getBoundingClientRect() : null;
      const margin = 60;
      let x, y, attempts = 0;
      do {
        x = rand2(5, 90);
        y = rand2(5, 90);
        attempts++;
        if (!rect) break;
        const px = x * window.innerWidth / 100;
        const py = y * window.innerHeight / 100;
        if (px < rect.left - margin || px > rect.right + margin || py < rect.top - margin || py > rect.bottom + margin) break;
      } while (attempts < 15);

      el.style.left = x + 'vw';
      el.style.top = y + 'vh';
      el.style.color = glitchColors2[Math.floor(Math.random() * glitchColors2.length)];

      const type = Math.random();

      if (type < 0.3) {
        // code snippet
        el.classList.add('artifact-code');
        el.textContent = codeSnippets[Math.floor(Math.random() * codeSnippets.length)];
        el.style.transform = `rotate(${rand2(-8, 8).toFixed(1)}deg) scale(${rand2(0.8, 1.5).toFixed(2)})`;
      } else if (type < 0.6) {
        // mini game scene (animated)
        el.classList.add('artifact-block');
        const canvas = spawnGameScene();
        el.appendChild(canvas);
        el.style.transform = `rotate(${rand2(-5, 5).toFixed(1)}deg)`;
      } else {
        // JPEG block artifact
        el.classList.add('artifact-block');
        const size = Math.floor(rand2(20, 80));
        const canvas = document.createElement('canvas');
        const blockSize = Math.floor(rand2(4, 12));
        canvas.width = size;
        canvas.height = size;
        canvas.style.width = size + 'px';
        canvas.style.height = size + 'px';
        const ctx = canvas.getContext('2d');
        const colors = ['#0ff', '#f0f', '#f00', '#0f0', '#000', '#111', '#222'];
        for (let bx = 0; bx < size; bx += blockSize) {
          for (let by = 0; by < size; by += blockSize) {
            ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
            ctx.globalAlpha = rand2(0.3, 1);
            ctx.fillRect(bx, by, blockSize, blockSize);
          }
        }
        el.appendChild(canvas);
        el.style.transform = `rotate(${rand2(-15, 15).toFixed(1)}deg)`;
      }

      el.style.opacity = rand2(0.4, 0.9).toFixed(2);
      document.body.appendChild(el);

      // game scenes last 15-30 seconds
      const isGame = type >= 0.3 && type < 0.6;
      const duration = isGame ? rand2(15000, 30000) : rand2(80, 400);
      setTimeout(() => {
        el.style.transition = "opacity 0.3s";
        el.style.opacity = "0";
        setTimeout(() => {
          // clean up scene type tracking
          if (isGame) {
            const canvas = el.querySelector("canvas");
            if (canvas && canvas._sceneType) activeSceneTypes.delete(canvas._sceneType);
          }
          if (el.parentNode) el.parentNode.removeChild(el);
        }, 300);
      }, duration);

      return el;
    }

    function spawnArtifactBurst(intensity) {
      const count = Math.floor(1 + intensity * 8);
      const spawned = [];
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          spawned.push(spawnArtifact());
        }, i * rand2(20, 80));
      }
    }

    function wrapChars(nameEl) {
      const text = nameEl.textContent;
      nameEl.textContent = "";
      for (const ch of text) {
        const span = document.createElement("span");
        span.className = "char";
        span.textContent = ch === " " ? "\u00A0" : ch;
        nameEl.appendChild(span);
      }
    }

    function startGlitch() {
      const nameEl = document.getElementById("name");
      const body = document.body;
      const chars = nameEl.querySelectorAll(".char");

      const glitchColors = ["#0ff", "#f0f", "#f00", "#0f0", "#ff0", "#f80"];

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function pickColor() {
        return glitchColors[Math.floor(Math.random() * glitchColors.length)];
      }

      function randomClip() {
        const style = Math.floor(rand(0, 5));
        const a = rand(0, 50), b = rand(50, 100);
        switch (style) {
          case 0: return `inset(${a}% 0 ${100-b}% 0)`;           // horizontal slice
          case 1: return `inset(0 ${100-b}% 0 ${a}%)`;           // vertical slice
          case 2: return `polygon(0 ${a}%, 100% 0, 100% ${b}%, 0 100%)`; // diagonal
          case 3: return `polygon(${a}% 0, 100% ${a}%, ${b}% 100%, 0 ${b}%)`; // skewed quad
          default: return `inset(${a}% ${rand(0,20)}% ${100-b}% ${rand(0,20)}%)`; // inset box
        }
      }

      function glitchChars(intensity) {
        const count = Math.max(1, Math.floor(chars.length * (0.2 + intensity * 0.8)));
        const indices = [];
        while (indices.length < count) {
          const idx = Math.floor(rand(0, chars.length));
          if (!indices.includes(idx)) indices.push(idx);
        }

        for (const idx of indices) {
          const ch = chars[idx];
          const mult = 1 + intensity * 5;

          ch.style.transform = `translate(${rand(-3,3)*mult}px, ${rand(-3,3)*mult}px) skewX(${rand(-10,10)*intensity}deg)`;

          if (Math.random() < 0.4 + intensity * 0.4) {
            ch.style.color = pickColor();
          }
          if (Math.random() < 0.3 + intensity * 0.3) {
            ch.style.textShadow = `${rand(-4,4)*mult}px ${rand(-2,2)*mult}px ${pickColor()}, ${rand(-4,4)*mult}px ${rand(-2,2)*mult}px ${pickColor()}`;
          }
          if (Math.random() < 0.2 * intensity) {
            ch.style.clipPath = randomClip();
            ch.style.webkitClipPath = ch.style.clipPath;
          }
          if (Math.random() < 0.15 * intensity) {
            ch.style.opacity = rand(0, 0.5).toFixed(2);
          }
        }
      }

      function clearChars() {
        for (const ch of chars) {
          ch.style.transform = "";
          ch.style.color = "";
          ch.style.textShadow = "";
          ch.style.clipPath = "";
          ch.style.webkitClipPath = "";
          ch.style.opacity = "";
        }
      }

      function glitchPage(intensity) {
        // even subtle glitches nudge the background
        if (intensity > 0.1) {
          const s = Math.floor(intensity * 20);
          const r = 10 + Math.floor(rand(-1,1) * s);
          const g = 10 + Math.floor(rand(-1,1) * s);
          const b = 10 + Math.floor(rand(-1,1) * s);
          body.style.backgroundColor = `rgb(${Math.max(0,r)}, ${Math.max(0,g)}, ${Math.max(0,b)})`;
        }
        if (intensity > 0.15 && Math.random() < 0.3) {
          body.style.opacity = rand(0.92, 1).toFixed(2);
        }
        if (intensity > 0.4) {
          const angle = rand(0, 180).toFixed(0);
          body.style.backgroundImage = `repeating-linear-gradient(
            ${angle}deg,
            transparent,
            transparent ${rand(2,4).toFixed(0)}px,
            rgba(${Math.random()<0.5?"0,255,255":"255,0,255"}, ${(intensity*0.1).toFixed(2)}) ${rand(2,4).toFixed(0)}px,
            transparent ${rand(4,8).toFixed(0)}px
          )`;
        }
        if (intensity > 0.7) {
          document.querySelector(".center").style.transform =
            `translate(${rand(-10,10).toFixed(1)}px, ${rand(-5,5).toFixed(1)}px) skewX(${rand(-3,3).toFixed(1)}deg)`;
          const statusEl = document.getElementById("status");
          statusEl.style.transform = `translate(${rand(-8,8).toFixed(1)}px, ${rand(-3,3).toFixed(1)}px)`;
          statusEl.style.opacity = Math.random() < 0.3 ? "0.3" : "1";
        }
        if (intensity > 0.85) {
          body.style.filter = `hue-rotate(${rand(-30,30).toFixed(0)}deg) saturate(${rand(1,3).toFixed(1)})`;
          nameEl.style.textShadow = `${rand(-10,10).toFixed(0)}px ${rand(-5,5).toFixed(0)}px ${pickColor()}, ${rand(-10,10).toFixed(0)}px ${rand(-5,5).toFixed(0)}px ${pickColor()}`;
        }
      }

      function clearPage() {
        body.style.backgroundColor = "";
        body.style.backgroundImage = "";
        body.style.filter = "";
        body.style.opacity = "";
        nameEl.style.transform = "";
        nameEl.style.textShadow = "";
        nameEl.style.opacity = "";
        document.querySelector(".center").style.transform = "";
        const statusEl = document.getElementById("status");
        statusEl.style.transform = "";
        statusEl.style.opacity = "";
      }

      function triggerGlitch() {
        const roll = Math.random();
        let intensity;
        if (roll < 0.5) intensity = rand(0, 0.2);
        else if (roll < 0.75) intensity = rand(0.2, 0.5);
        else if (roll < 0.9) intensity = rand(0.5, 0.8);
        else intensity = rand(0.8, 1.0);

        const burstCount = intensity > 0.6
          ? Math.floor(rand(4, 10))
          : (Math.random() < 0.4 ? Math.floor(rand(2, 5)) : 1);
        const frameDuration = rand(30, 80);
        let frame = 0;

        const interval = setInterval(() => {
          if (frame >= burstCount) {
            clearInterval(interval);
            clearChars();
            clearPage();
            return;
          }
          clearChars();
          glitchChars(intensity);
          glitchPage(intensity);

          // spawn artifacts during glitch frames
          if (frame === 0 && Math.random() < 0.3 + intensity * 0.5) {
            spawnArtifactBurst(intensity);
          }

          // matrix rain on wild glitches
          if (frame === 0 && intensity > 0.8) {
            matrix.start();
            setTimeout(() => matrix.stop(), 500 + intensity * 1000);
          }

          // whole-name distortion
          if (intensity > 0.3) {
            nameEl.style.transform = `skewX(${rand(-4,4)*(1+intensity*2)}deg) translate(${rand(-3,3)*(1+intensity*3)}px, ${rand(-2,2)*intensity*3}px)`;
          }
          if (Math.random() < 0.2 + intensity * 0.3) {
            nameEl.style.opacity = Math.random() < 0.5 ? "0" : "1";
          }

          frame++;
        }, frameDuration);

        const next = rand(1500, 4000);
        setTimeout(triggerGlitch, next);
      }

      setTimeout(triggerGlitch, rand(1000, 2000));

      // expose for interaction glitch
      forceGlitch = (intensity) => {
        const burstCount = Math.floor(rand(4, 10));
        const frameDuration = rand(30, 60);
        let frame = 0;
        const interval = setInterval(() => {
          if (frame >= burstCount) {
            clearInterval(interval);
            clearChars();
            clearPage();
            return;
          }
          clearChars();
          glitchChars(intensity);
          glitchPage(intensity);
          if (frame === 0) spawnArtifactBurst(intensity);
          if (intensity > 0.3) {
            nameEl.style.transform = `skewX(${rand(-4,4)*(1+intensity*2)}deg) translate(${rand(-3,3)*(1+intensity*3)}px, ${rand(-2,2)*intensity*3}px)`;
          }
          frame++;
        }, frameDuration);
      };
    }

    // --- Matrix rain ---
    function initMatrix() {
      const canvas = document.getElementById("matrix-canvas");
      const ctx = canvas.getContext("2d");
      const chars = "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF<>/{}();=+*&|^~";
      const cellW = 14, cellH = 16;
      let streams = [];
      let animId = null;
      let active = false;
      let spawning = false;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);

      function spawnStream() {
        const x = Math.floor(Math.random() * (canvas.width / cellW)) * cellW;
        const speed = 1 + Math.random() * 4;
        const length = 5 + Math.floor(Math.random() * 25);
        const brightness = 0.5 + Math.random() * 0.5;
        return {
          x,
          y: -Math.random() * canvas.height * 0.5,
          speed,
          length,
          brightness,
          chars: Array.from({length}, () => chars[Math.floor(Math.random() * chars.length)]),
          age: 0,
        };
      }

      function draw() {
        ctx.fillStyle = "rgba(10, 10, 10, 0.12)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = "13px JetBrains Mono, monospace";

        // spawn new streams sporadically (only while spawning)
        if (spawning) {
          const maxStreams = Math.floor(canvas.width / cellW * 0.15);
          if (streams.length < maxStreams && Math.random() < 0.3) {
            streams.push(spawnStream());
          }
        }

        const alive = [];
        for (const s of streams) {
          s.y += s.speed;
          s.age++;

          // occasionally mutate characters
          if (Math.random() < 0.1) {
            const idx = Math.floor(Math.random() * s.chars.length);
            s.chars[idx] = chars[Math.floor(Math.random() * chars.length)];
          }

          for (let i = 0; i < s.length; i++) {
            const charY = s.y - i * cellH;
            if (charY < -cellH || charY > canvas.height) continue;

            const fade = 1 - (i / s.length);
            if (i === 0) {
              // leading character is bright white-green
              ctx.fillStyle = `rgba(180, 255, 180, ${s.brightness})`;
            } else {
              const g = Math.floor(100 + fade * 155);
              ctx.fillStyle = `rgba(0, ${g}, 0, ${fade * s.brightness * 0.8})`;
            }
            ctx.fillText(s.chars[i], s.x, charY);
          }

          // keep stream alive while tail is still on screen
          const tailY = s.y - s.length * cellH;
          if (tailY < canvas.height) {
            alive.push(s);
          }
        }
        streams = alive;

        if (active) animId = requestAnimationFrame(draw);
      }

      return {
        start() {
          if (active) return;
          active = true;
          spawning = true;
          canvas.style.opacity = "1";
          canvas.style.transition = "";
          streams = [];
          // seed a few initial streams
          for (let i = 0; i < 5 + Math.floor(Math.random() * 8); i++) {
            const s = spawnStream();
            s.y = Math.random() * canvas.height;
            streams.push(s);
          }
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          draw();
        },
        stop() {
          // stop spawning new streams, let existing ones drain off screen
          spawning = false;
          // fade out gradually over 2 seconds
          canvas.style.transition = "opacity 2s";
          canvas.style.opacity = "0";
          setTimeout(() => {
            active = false;
            if (animId) cancelAnimationFrame(animId);
            canvas.style.transition = "";
          }, 2500);
        }
      };
    }

    const matrix = initMatrix();

    // --- Cursor proximity distortion ---
    function initCursorProximity() {
      const nameEl = document.getElementById("name");
      const colors = ["#0ff", "#f0f", "#f00", "#0f0", "#ff0"];
      const radius = 120;
      let mouseX = -9999, mouseY = -9999;
      let rafId = null;

      document.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        if (!rafId) rafId = requestAnimationFrame(updateProximity);
      });

      function updateProximity() {
        rafId = null;
        const chars = nameEl.querySelectorAll(".char");
        for (const ch of chars) {
          const rect = ch.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          const dx = mouseX - cx;
          const dy = mouseY - cy;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < radius) {
            const force = 1 - (dist / radius);
            const pushX = -dx * force * 0.4;
            const pushY = -dy * force * 0.4;
            const skew = (Math.random() - 0.5) * force * 20;
            ch.style.transform = `translate(${pushX.toFixed(1)}px, ${pushY.toFixed(1)}px) skewX(${skew.toFixed(1)}deg)`;

            if (force > 0.3) {
              ch.style.color = colors[Math.floor(Math.random() * colors.length)];
              ch.style.textShadow = `${(Math.random()-0.5)*force*8}px ${(Math.random()-0.5)*force*4}px ${colors[Math.floor(Math.random()*colors.length)]}`;
            }
            if (force > 0.6) {
              ch.style.opacity = (0.5 + Math.random() * 0.5).toFixed(2);
            }
          } else {
            ch.style.transform = "";
            ch.style.color = "";
            ch.style.textShadow = "";
            ch.style.opacity = "";
          }
        }
      }
    }
