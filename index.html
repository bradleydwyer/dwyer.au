<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brad Dwyer</title>
  <meta name="description" content="Brad Dwyer">
  <link rel="canonical" href="https://dwyer.au">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: "JetBrains Mono", "SF Mono", "Cascadia Code", "Fira Code", monospace;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .name {
      font-size: clamp(1.5rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      position: relative;
    }

    .name::after {
      content: "_";
      animation: blink 1s step-end infinite;
    }

    .name .char {
      display: inline-block;
      position: relative;
    }

    .status {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
      min-height: 1.2em;
    }

    .status::after {
      content: "_";
      animation: blink 1s step-end infinite;
    }

    .artifact {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
      font-family: "JetBrains Mono", monospace;
      white-space: pre;
      line-height: 1.1;
    }

    .artifact-code {
      font-size: clamp(0.5rem, 1.2vw, 0.75rem);
      opacity: 0.6;
    }

    .artifact-pixel {
      font-size: clamp(3px, 0.6vw, 5px);
      line-height: 1;
      letter-spacing: 0;
    }

    .artifact-block {
      image-rendering: pixelated;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="center">
    <div class="name" id="name"></div>
    <div class="status" id="status"></div>
  </div>
  <script>
    const messages = [
      "Website arriving soon",
      "Something is brewing",
      "Under construction",
      "Watch this space",
      "Stay tuned",
      "Almost ready",
      "Building something new",
      "Check back shortly",
      "Work in progress",
      "Launching soon",
      "Not quite yet",
      "Patience",
      "Good things take time",
      "Crafting pixels",
      "Wiring things up",
      "One moment",
      "Putting it together",
      "Hang tight",
      "On the way",
      "Still cooking",
      "Just around the corner",
      "In the works",
      "Loading",
      "Assembling",
      "Getting there",
      "Bear with me",
      "Coming right up",
      "Tuning things up",
      "Making it happen",
      "New site who dis",
      "4.3 PRs",
    ];

    for (let i = messages.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [messages[i], messages[j]] = [messages[j], messages[i]];
    }

    const el = document.getElementById("status");
    let msgIndex = 0;

    const TYPE_SPEED = 70;
    const PAUSE_AFTER = 2500;
    const DELETE_SPEED = 40;
    const PAUSE_BEFORE = 500;

    function typeMessage() {
      const text = messages[msgIndex];
      let i = 0;

      function typeChar() {
        if (i < text.length) {
          el.textContent = text.slice(0, i + 1);
          i++;
          setTimeout(typeChar, TYPE_SPEED);
        } else {
          setTimeout(deleteMessage, PAUSE_AFTER);
        }
      }

      typeChar();
    }

    function deleteMessage() {
      const text = el.textContent;
      let i = text.length;

      function deleteChar() {
        if (i > 0) {
          i--;
          el.textContent = text.slice(0, i);
          setTimeout(deleteChar, DELETE_SPEED);
        } else {
          msgIndex = (msgIndex + 1) % messages.length;
          setTimeout(typeMessage, PAUSE_BEFORE);
        }
      }

      deleteChar();
    }

    function typeName(callback) {
      const nameEl = document.getElementById("name");
      const name = "Brad Dwyer";
      let i = 0;

      function typeChar() {
        if (i < name.length) {
          nameEl.textContent = name.slice(0, i + 1);
          nameEl.setAttribute("data-text", name.slice(0, i + 1));
          i++;
          const delay = 300 + Math.random() * 1200;
          setTimeout(typeChar, delay);
        } else {
          setTimeout(callback, 800);
        }
      }

      typeChar();
    }

    // --- Glitch artifacts ---
    const codeSnippets = [
      'if (err != nil) {\n  return err\n}',
      'sudo rm -rf /',
      '#include <stdio.h>\nint main() {',
      'while(true) {\n  hack();\n}',
      '10 PRINT "HELLO"\n20 GOTO 10',
      'SELECT * FROM\n  users WHERE 1=1',
      ':wq!',
      'git push --force',
      'npm install\n  found 0 vuln',
      'segfault at 0x0',
      'panic: runtime\n  error',
      'HTTP/1.1 418\n  I\'m a teapot',
      '0xDEADBEEF',
      'eval(atob("..."))',
      'import antigravity',
      '// TODO: fix this',
      '} catch (e) {\n  // ¯\\_(ツ)_/¯\n}',
      'console.log("here")',
      'rm -rf node_modules',
      'pip install --upgrade',
      'fn main() {\n  println!("ok");\n}',
      'async fn poll() ->\n  Result<()>',
    ];

    // pixel art as block characters (each row is a string)
    const sprites = {
      invader1: [
        '  ▓▓  ▓▓  ',
        '  ▓▓▓▓▓▓  ',
        ' ▓▓████▓▓ ',
        ' ▓█▓▓▓▓█▓ ',
        ' ▓▓▓▓▓▓▓▓ ',
        '  ▓ ▓▓ ▓  ',
        ' ▓  ▓▓  ▓ ',
      ],
      invader2: [
        '   ▓▓▓▓   ',
        ' ▓▓▓▓▓▓▓▓ ',
        '▓▓█▓▓▓▓█▓▓',
        '▓▓▓▓▓▓▓▓▓▓',
        ' ▓▓ ▓▓ ▓▓ ',
        '▓▓ ▓▓▓▓ ▓▓',
      ],
      pacman: [
        '  ████  ',
        ' ██████ ',
        '████    ',
        '███████ ',
        ' ██████ ',
        '  ████  ',
      ],
      ghost: [
        '  ████  ',
        ' ██████ ',
        '█▓█▓████',
        '████████',
        '████████',
        '█ ██ ██ ',
      ],
      heart: [
        ' ██ ██ ',
        '███████',
        '███████',
        ' █████ ',
        '  ███  ',
        '   █   ',
      ],
      skull: [
        ' ████ ',
        '██████',
        '█▓██▓█',
        '██████',
        ' █ █ █',
        ' █ █ █',
      ],
    };

    const glitchColors2 = ['#0ff', '#f0f', '#f00', '#0f0', '#ff0', '#f80', '#0ff', '#fff'];

    function rand2(min, max) {
      return min + Math.random() * (max - min);
    }

    function spawnArtifact() {
      const el = document.createElement('div');
      el.className = 'artifact';
      const x = rand2(5, 90);
      const y = rand2(5, 90);
      el.style.left = x + 'vw';
      el.style.top = y + 'vh';
      el.style.color = glitchColors2[Math.floor(Math.random() * glitchColors2.length)];

      const type = Math.random();

      if (type < 0.35) {
        // code snippet
        el.classList.add('artifact-code');
        el.textContent = codeSnippets[Math.floor(Math.random() * codeSnippets.length)];
        el.style.transform = `rotate(${rand2(-8, 8).toFixed(1)}deg) scale(${rand2(0.8, 1.5).toFixed(2)})`;
      } else if (type < 0.65) {
        // pixel sprite
        el.classList.add('artifact-pixel');
        const keys = Object.keys(sprites);
        const sprite = sprites[keys[Math.floor(Math.random() * keys.length)]];
        el.textContent = sprite.join('\n');
        el.style.transform = `scale(${rand2(1, 3).toFixed(1)})`;
      } else {
        // JPEG block artifact
        el.classList.add('artifact-block');
        const size = Math.floor(rand2(20, 80));
        const canvas = document.createElement('canvas');
        const blockSize = Math.floor(rand2(4, 12));
        canvas.width = size;
        canvas.height = size;
        canvas.style.width = size + 'px';
        canvas.style.height = size + 'px';
        const ctx = canvas.getContext('2d');
        const colors = ['#0ff', '#f0f', '#f00', '#0f0', '#000', '#111', '#222'];
        for (let bx = 0; bx < size; bx += blockSize) {
          for (let by = 0; by < size; by += blockSize) {
            ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
            ctx.globalAlpha = rand2(0.3, 1);
            ctx.fillRect(bx, by, blockSize, blockSize);
          }
        }
        el.appendChild(canvas);
        el.style.transform = `rotate(${rand2(-15, 15).toFixed(1)}deg)`;
      }

      el.style.opacity = rand2(0.3, 0.9).toFixed(2);
      document.body.appendChild(el);

      const duration = rand2(80, 400);
      setTimeout(() => {
        if (el.parentNode) el.parentNode.removeChild(el);
      }, duration);

      return el;
    }

    function spawnArtifactBurst(intensity) {
      const count = Math.floor(1 + intensity * 8);
      const spawned = [];
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          spawned.push(spawnArtifact());
        }, i * rand2(20, 80));
      }
    }

    function wrapChars(nameEl) {
      const text = nameEl.textContent;
      nameEl.textContent = "";
      for (const ch of text) {
        const span = document.createElement("span");
        span.className = "char";
        span.textContent = ch === " " ? "\u00A0" : ch;
        nameEl.appendChild(span);
      }
    }

    function startGlitch() {
      const nameEl = document.getElementById("name");
      const body = document.body;
      const chars = nameEl.querySelectorAll(".char");

      const glitchColors = ["#0ff", "#f0f", "#f00", "#0f0", "#ff0", "#f80"];

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function pickColor() {
        return glitchColors[Math.floor(Math.random() * glitchColors.length)];
      }

      function randomClip() {
        const style = Math.floor(rand(0, 5));
        const a = rand(0, 50), b = rand(50, 100);
        switch (style) {
          case 0: return `inset(${a}% 0 ${100-b}% 0)`;           // horizontal slice
          case 1: return `inset(0 ${100-b}% 0 ${a}%)`;           // vertical slice
          case 2: return `polygon(0 ${a}%, 100% 0, 100% ${b}%, 0 100%)`; // diagonal
          case 3: return `polygon(${a}% 0, 100% ${a}%, ${b}% 100%, 0 ${b}%)`; // skewed quad
          default: return `inset(${a}% ${rand(0,20)}% ${100-b}% ${rand(0,20)}%)`; // inset box
        }
      }

      function glitchChars(intensity) {
        const count = Math.max(1, Math.floor(chars.length * (0.2 + intensity * 0.8)));
        const indices = [];
        while (indices.length < count) {
          const idx = Math.floor(rand(0, chars.length));
          if (!indices.includes(idx)) indices.push(idx);
        }

        for (const idx of indices) {
          const ch = chars[idx];
          const mult = 1 + intensity * 5;

          ch.style.transform = `translate(${rand(-3,3)*mult}px, ${rand(-3,3)*mult}px) skewX(${rand(-10,10)*intensity}deg)`;

          if (Math.random() < 0.4 + intensity * 0.4) {
            ch.style.color = pickColor();
          }
          if (Math.random() < 0.3 + intensity * 0.3) {
            ch.style.textShadow = `${rand(-4,4)*mult}px ${rand(-2,2)*mult}px ${pickColor()}, ${rand(-4,4)*mult}px ${rand(-2,2)*mult}px ${pickColor()}`;
          }
          if (Math.random() < 0.2 * intensity) {
            ch.style.clipPath = randomClip();
            ch.style.webkitClipPath = ch.style.clipPath;
          }
          if (Math.random() < 0.15 * intensity) {
            ch.style.opacity = rand(0, 0.5).toFixed(2);
          }
        }
      }

      function clearChars() {
        for (const ch of chars) {
          ch.style.transform = "";
          ch.style.color = "";
          ch.style.textShadow = "";
          ch.style.clipPath = "";
          ch.style.webkitClipPath = "";
          ch.style.opacity = "";
        }
      }

      function glitchPage(intensity) {
        // even subtle glitches nudge the background
        if (intensity > 0.1) {
          const s = Math.floor(intensity * 20);
          const r = 10 + Math.floor(rand(-1,1) * s);
          const g = 10 + Math.floor(rand(-1,1) * s);
          const b = 10 + Math.floor(rand(-1,1) * s);
          body.style.backgroundColor = `rgb(${Math.max(0,r)}, ${Math.max(0,g)}, ${Math.max(0,b)})`;
        }
        if (intensity > 0.15 && Math.random() < 0.3) {
          body.style.opacity = rand(0.92, 1).toFixed(2);
        }
        if (intensity > 0.4) {
          const angle = rand(0, 180).toFixed(0);
          body.style.backgroundImage = `repeating-linear-gradient(
            ${angle}deg,
            transparent,
            transparent ${rand(2,4).toFixed(0)}px,
            rgba(${Math.random()<0.5?"0,255,255":"255,0,255"}, ${(intensity*0.1).toFixed(2)}) ${rand(2,4).toFixed(0)}px,
            transparent ${rand(4,8).toFixed(0)}px
          )`;
        }
        if (intensity > 0.7) {
          document.querySelector(".center").style.transform =
            `translate(${rand(-10,10).toFixed(1)}px, ${rand(-5,5).toFixed(1)}px) skewX(${rand(-3,3).toFixed(1)}deg)`;
          const statusEl = document.getElementById("status");
          statusEl.style.transform = `translate(${rand(-8,8).toFixed(1)}px, ${rand(-3,3).toFixed(1)}px)`;
          statusEl.style.opacity = Math.random() < 0.3 ? "0.3" : "1";
        }
        if (intensity > 0.85) {
          body.style.filter = `hue-rotate(${rand(-30,30).toFixed(0)}deg) saturate(${rand(1,3).toFixed(1)})`;
          nameEl.style.textShadow = `${rand(-10,10).toFixed(0)}px ${rand(-5,5).toFixed(0)}px ${pickColor()}, ${rand(-10,10).toFixed(0)}px ${rand(-5,5).toFixed(0)}px ${pickColor()}`;
        }
      }

      function clearPage() {
        body.style.backgroundColor = "";
        body.style.backgroundImage = "";
        body.style.filter = "";
        body.style.opacity = "";
        nameEl.style.transform = "";
        nameEl.style.textShadow = "";
        nameEl.style.opacity = "";
        document.querySelector(".center").style.transform = "";
        const statusEl = document.getElementById("status");
        statusEl.style.transform = "";
        statusEl.style.opacity = "";
      }

      function triggerGlitch() {
        const roll = Math.random();
        let intensity;
        if (roll < 0.5) intensity = rand(0, 0.2);
        else if (roll < 0.75) intensity = rand(0.2, 0.5);
        else if (roll < 0.9) intensity = rand(0.5, 0.8);
        else intensity = rand(0.8, 1.0);

        const burstCount = intensity > 0.6
          ? Math.floor(rand(4, 10))
          : (Math.random() < 0.4 ? Math.floor(rand(2, 5)) : 1);
        const frameDuration = rand(30, 80);
        let frame = 0;

        const interval = setInterval(() => {
          if (frame >= burstCount) {
            clearInterval(interval);
            clearChars();
            clearPage();
            return;
          }
          clearChars();
          glitchChars(intensity);
          glitchPage(intensity);

          // spawn artifacts during glitch frames
          if (frame === 0 && Math.random() < 0.3 + intensity * 0.5) {
            spawnArtifactBurst(intensity);
          }

          // whole-name distortion
          if (intensity > 0.3) {
            nameEl.style.transform = `skewX(${rand(-4,4)*(1+intensity*2)}deg) translate(${rand(-3,3)*(1+intensity*3)}px, ${rand(-2,2)*intensity*3}px)`;
          }
          if (Math.random() < 0.2 + intensity * 0.3) {
            nameEl.style.opacity = Math.random() < 0.5 ? "0" : "1";
          }

          frame++;
        }, frameDuration);

        const next = rand(1500, 4000);
        setTimeout(triggerGlitch, next);
      }

      setTimeout(triggerGlitch, rand(1000, 2000));
    }

    typeName(() => {
      const nameEl = document.getElementById("name");
      wrapChars(nameEl);
      startGlitch();
      typeMessage();
    });
  </script>
</body>
</html>
