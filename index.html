<html lang="en">

  <meta charset="utf-8">

  <link rel="canonical" href="https://dwyer.au">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: "JetBrains Mono", "SF Mono", "Cascadia Code", "Fira Code", monospace;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .name {
      font-size: clamp(1.5rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      position: relative;
    }

    .name::after {
      content: "_";
      animation: blink 1s step-end infinite;
    }

    .name.no-cursor::after {
      content: "";
    }

    .inline-cursor {
      animation: blink 1s step-end infinite;
    }

    .name .char {
      display: inline-block;
      position: relative;
    }

    .status {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
      min-height: 1.2em;
    }

    .status::after {
      content: "_";
      animation: blink 1s step-end infinite;
    }

    /* CRT scanline overlay */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 4px
      );
    }

    /* Matrix rain canvas */
    #matrix-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 998;
      opacity: 0;
      transition: opacity 0.3s;
    }


    .artifact {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
      font-family: "JetBrains Mono", monospace;
      white-space: pre;
      line-height: 1.1;
    }

    .artifact-code {
      font-size: clamp(0.5rem, 1.2vw, 0.75rem);
      opacity: 0.6;
    }

    .artifact-pixel {
      font-size: clamp(3px, 0.6vw, 5px);
      line-height: 1;
      letter-spacing: 0;
    }

    .artifact-block {
      image-rendering: pixelated;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Photosensitivity warning overlay */
    #warning-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10000;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 1;
    }
    #warning-overlay svg line,
    #warning-overlay svg circle {
      fill: none;
      stroke: #ffd600;
      stroke-linecap: round;
    }
    #warning-overlay .tri-left {
      stroke-width: 5;
      stroke-dasharray: 86;
      stroke-dashoffset: 86;
      animation: draw-stroke 0.8s ease-in-out 0.2s forwards;
    }
    #warning-overlay .tri-right {
      stroke-width: 5;
      stroke-dasharray: 86;
      stroke-dashoffset: 86;
      animation: draw-stroke 0.8s ease-in-out 0.2s forwards;
    }
    #warning-overlay .tri-bottom {
      stroke-width: 5;
      stroke-dasharray: 81;
      stroke-dashoffset: 81;
      animation: draw-stroke 0.8s ease-in-out 0.2s forwards;
    }
    #warning-overlay .warn-line {
      stroke-width: 6;
      stroke-dasharray: 24;
      stroke-dashoffset: 24;
      animation: draw-stroke 0.35s ease-out 1.1s forwards;
    }
    #warning-overlay .warn-dot {
      fill: #ffd600;
      stroke: none;
      opacity: 0;
      transform-origin: 50px 72px;
      animation: pop-dot 0.3s ease-out 1.5s forwards;
    }
    @keyframes draw-stroke {
      to { stroke-dashoffset: 0; }
    }
    @keyframes pop-dot {
      0% { opacity: 0; transform: scale(0); }
      70% { opacity: 1; transform: scale(1.4); }
      100% { opacity: 1; transform: scale(1); }
    }
    #warning-overlay .warn-text {
      color: #ccc;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      text-align: center;
      max-width: 340px;
      line-height: 1.5;
      margin-top: 24px;
      opacity: 0;
      animation: fade-in-text 0.6s ease-out 1.9s forwards;
    }
    #warning-overlay .warn-progress {
      width: 340px;
      max-width: 80vw;
      height: 2px;
      margin-top: 20px;
      display: flex;
      justify-content: center;
      opacity: 0;
      animation: fade-in-text 0.4s ease-out 2.0s forwards;
    }
    #warning-overlay .warn-progress-bar {
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.5);
      transition: width 0.1s linear;
    }
    @keyframes fade-in-text {
      to { opacity: 1; }
    }
    /* Toast time prompt */
    #toast-prompt {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9998;
      background: rgba(20, 16, 8, 0.92);
      border: 1px solid #d4a04433;
      padding: 0.8rem 1.4rem;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.85rem;
      color: #e8d5b0;
      display: flex;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      transition: opacity 0.4s, transform 0.4s;
      pointer-events: none;
    }
    #toast-prompt.visible {
      opacity: 1;
      pointer-events: auto;
    }
    #toast-prompt.hiding {
      opacity: 0;
      transform: translateX(-50%) translateY(20px);
    }
    #toast-prompt button {
      background: #d4a044;
      color: #1a1208;
      border: none;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    #toast-prompt button:hover {
      background: #eab762;
    }
    #toast-prompt .toast-timer {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: #d4a044;
      transition: width 0.1s linear;
    }
  </style>
</head>

      canvas.style.imageRendering = "pixelated";
      const ctx = canvas.getContext("2d");

      const normalSceneFactories = [drawPacmanScene, createPongScene, drawSnakeScene, createTetrisScene, createBreakoutScene, drawWargamesScene, createWoprMapScene, createFighterScene, drawAdventureScene, drawKeenScene, createDoomScene, drawBSODScene, drawPinwheelScene, createInvadersScene, createWordleScene, createFlappyScene, createAngryBirdsScene, createGorillasScene, createPlasmaScene, createMissileCommandScene, createOregonTrailScene, createPrinceScene, createLemmingsScene, createWin95Scene, createAmigaBoingScene, createWolfensteinScene, createMinesweeperScene, createPipeDreamScene, createGameOfLifeScene, createDOSBootScene, createCarmenScene, createStrongBadScene, createTrogdorScene, createAIChatScene, createKingsQuestScene, createQuestForGloryScene, createPoliceQuestScene, createMinecraftScene, createZomboScene, createNFSScene, createAsteroidsScene, createFroggerScene, createGalagaScene, createSimCityScene, createSonicScene, createMarioScene, createZeldaScene, createDonkeyKongScene];
      const sceneFactories = toastMode ? toastSceneFactories : normalSceneFactories;

      // pick a scene that isn't already on screen, preferring ones not recently shown
      const available = sceneFactories.filter(f => !activeSceneTypes.has(f.name));
      if (available.length === 0) return canvas; // all active, return blank
      const recentSet = new Set(recentScenes);
      const unseen = available.filter(f => !recentSet.has(f.name));
      const pool = unseen.length > 0 ? unseen : available;
      const factory = pool[Math.floor(Math.random() * pool.length)];
      recentScenes.push(factory.name);
      if (recentScenes.length > sceneFactories.length * 0.75) recentScenes.shift();
      activeSceneTypes.add(factory.name);
      canvas._sceneType = factory.name;

      // stateful scenes return a draw function; stateless are used directly
      const sceneResult = factory(ctx, w, h, px, -1, 0);
      const isStateful = typeof sceneResult === "function";
      const drawFn = isStateful ? sceneResult : null;

      let frame = 0;
      const totalFrames = 300 + Math.floor(Math.random() * 300);

      function animate() {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, w, h);
        if (isStateful) {
          drawFn(frame);
        } else {
          factory(ctx, w, h, px, frame, totalFrames);
        }
        frame++;
        if (frame < totalFrames) {
          requestAnimationFrame(animate);
        }
      }

      animate();
      return canvas;
    }

    // --- Bread / Dryer scenes (toast mode) ---
    const toastSceneFactories = [drawBreadLoafScene, drawCroissantScene, drawToastScene, drawBaguetteScene, drawDryerFrontLoadScene, drawLaundryRoomScene];

    function drawBreadLoafScene(ctx, w, h, px, frame) {
      const tableHeight = Math.floor(h * 0.25);
      ctx.fillStyle = "#1a1208";
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = "#3b2614";
      ctx.fillRect(0, h - tableHeight, w, tableHeight);
      const loafWidth = 80, loafHeight = 40;
      const loafX = (w - loafWidth) / 2;
      const loafY = h - tableHeight - loafHeight + 6;
      ctx.fillStyle = "#d79b43";
      ctx.fillRect(loafX + 4, loafY + 6, loafWidth - 8, loafHeight - 10);
      ctx.fillStyle = "#eab762";
      ctx.fillRect(loafX, loafY, loafWidth, loafHeight - 8);
      ctx.fillStyle = "rgba(255,255,255,0.15)";
      ctx.fillRect(loafX + 4, loafY + 4, loafWidth - 10, 6);
      ctx.fillStyle = "#c08134";
      ctx.fillRect(loafX + loafWidth - 20, loafY + 2, 4, loafHeight - 10);
      ctx.fillRect(loafX + loafWidth - 28, loafY + 4, 4, loafHeight - 10);
      const steamBaseX = loafX + loafWidth / 2, steamBaseY = loafY;
      const phase = frame * 0.15;
      ctx.strokeStyle = "rgba(255,255,255,0.6)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i < 3; i++) {
        const offset = (i - 1) * 6;
        const height = 18 + 4 * Math.sin(phase + i);
        ctx.moveTo(steamBaseX + offset, steamBaseY);
        ctx.bezierCurveTo(steamBaseX + offset - 4, steamBaseY - height * 0.4, steamBaseX + offset + 4, steamBaseY - height * 0.8, steamBaseX + offset, steamBaseY - height);
      }
      ctx.stroke();
      ctx.fillStyle = "#f5e0b8";
      ctx.font = "8px monospace";
      ctx.fillText("FRESH BREAD", 6, 12);
    }

    function drawCroissantScene(ctx, w, h, px, frame) {
      const tableHeight = Math.floor(h * 0.3);
      ctx.fillStyle = "#0b0b18";
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = "#402215";
      ctx.fillRect(0, h - tableHeight, w, tableHeight);
      const plateRadius = 32, plateX = w / 2, plateY = h - tableHeight + plateRadius;
      ctx.fillStyle = "#f5f5f5";
      ctx.beginPath(); ctx.arc(plateX, plateY, plateRadius, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#e0e0e0";
      ctx.beginPath(); ctx.arc(plateX, plateY, plateRadius - 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#e6a445";
      const segments = 7, baseRadius = 14, innerRadius = 7, angleOffset = -Math.PI / 2;
      for (let i = 0; i < segments; i++) {
        const t = i / (segments - 1);
        const angle = angleOffset + (t - 0.5) * Math.PI * 1.2;
        const xOuter = plateX + Math.cos(angle) * (baseRadius + 6 * t);
        const yOuter = plateY + Math.sin(angle) * (baseRadius + 2 * t);
        const xInner = plateX + Math.cos(angle) * innerRadius;
        const yInner = plateY + Math.sin(angle) * (innerRadius + 1);
        ctx.beginPath(); ctx.moveTo(xInner, yInner); ctx.lineTo(xOuter + 3, yOuter); ctx.lineTo(xOuter - 3, yOuter); ctx.closePath(); ctx.fill();
      }
      ctx.fillStyle = "#f4c366";
      ctx.beginPath();
      ctx.arc(plateX, plateY, baseRadius + 4, angleOffset - 0.7, angleOffset + 0.7);
      ctx.arc(plateX, plateY, innerRadius, angleOffset + 0.7, angleOffset - 0.7, true);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.15)";
      ctx.fillRect(plateX - 20, plateY - plateRadius - 8, 40, 6);
      ctx.fillStyle = "#f5e0b8";
      ctx.font = "7px monospace";
      ctx.fillText("MORNING PASTRY", 4, 12);
    }

    function drawToastScene(ctx, w, h, px, frame) {
      ctx.fillStyle = "#101820";
      ctx.fillRect(0, 0, w, h);
      const toasterWidth = 60, toasterHeight = 40;
      const toasterX = (w - toasterWidth) / 2, toasterY = h - toasterHeight - 10;
      ctx.fillStyle = "#c0c8d8";
      ctx.fillRect(toasterX, toasterY, toasterWidth, toasterHeight);
      ctx.fillStyle = "#e0e6f0";
      ctx.fillRect(toasterX + 4, toasterY + 4, toasterWidth - 8, toasterHeight - 10);
      ctx.fillStyle = "#a0a8b8";
      ctx.fillRect(toasterX + toasterWidth - 8, toasterY + toasterHeight - 16, 4, 14);
      const slotWidth = 18, slotHeight = 18;
      const slotY = toasterY - slotHeight + 4;
      const bounce = Math.max(0, Math.sin(frame * 0.2)) * 8;
      function drawSlice(cx) {
        const y = slotY - bounce;
        ctx.fillStyle = "#f2d5a2";
        ctx.fillRect(cx, y, slotWidth, slotHeight);
        ctx.fillStyle = "#d49c54";
        ctx.fillRect(cx, y, slotWidth, 4);
        ctx.fillRect(cx, y + slotHeight - 3, slotWidth, 3);
        ctx.fillRect(cx, y + 3, 2, slotHeight - 6);
        ctx.fillRect(cx + slotWidth - 2, y + 3, 2, slotHeight - 6);
      }
      drawSlice(toasterX + 10);
      drawSlice(toasterX + toasterWidth - 10 - slotWidth);
      ctx.fillStyle = "rgba(255,255,255,0.6)";
      for (let i = 0; i < 3; i++) {
        const sx = toasterX + 16 + i * 8;
        const sy = slotY - bounce;
        const height = 14 + 3 * Math.sin(frame * 0.25 + i);
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.bezierCurveTo(sx - 3, sy - height * 0.4, sx + 3, sy - height * 0.8, sx, sy - height);
        ctx.stroke();
      }
      ctx.fillStyle = "#f5e0b8";
      ctx.font = "7px monospace";
      ctx.fillText("TOAST TIME", 6, 12);
    }

    function drawBaguetteScene(ctx, w, h, px, frame) {
      ctx.fillStyle = "#120f0c";
      ctx.fillRect(0, 0, w, h);
      const shelfY = Math.floor(h * 0.7);
      ctx.fillStyle = "#3a2613";
      ctx.fillRect(0, shelfY, w, h - shelfY);
      ctx.fillStyle = "#e1b15c";
      const baseY = shelfY - 20;
      const speed = 0.5;
      const offset = (frame * speed) % (w + 60);
      for (let i = -60; i < w + 60; i += 40) {
        const x = i - offset;
        const width = 50, height = 14;
        ctx.fillRect(x, baseY, width, height);
        ctx.beginPath();
        ctx.arc(x + 8, baseY, 8, Math.PI, 0);
        ctx.arc(x + width - 8, baseY, 8, Math.PI, 0);
        ctx.fill();
        ctx.fillStyle = "#d29b4b";
        for (let j = 0; j < 4; j++) {
          const cutX = x + 8 + j * 9;
          ctx.beginPath(); ctx.moveTo(cutX - 4, baseY + 2); ctx.lineTo(cutX + 4, baseY + 2); ctx.lineTo(cutX + 6, baseY + height - 2); ctx.lineTo(cutX - 2, baseY + height - 2); ctx.closePath(); ctx.fill();
        }
        ctx.fillStyle = "#e1b15c";
      }
      ctx.fillStyle = "#f5e0b8";
      ctx.font = "7px monospace";
      ctx.fillText("BOULANGERIE", 6, 12);
    }

    function drawDryerFrontLoadScene(ctx, w, h, px, frame) {
      ctx.fillStyle = "#0a1018";
      ctx.fillRect(0, 0, w, h);
      const floorY = Math.floor(h * 0.75);
      ctx.fillStyle = "#1c2530";
      ctx.fillRect(0, floorY, w, h - floorY);
      const dryerW = 70, dryerH = 70;
      const dryerX = (w - dryerW) / 2, dryerY = floorY - dryerH;
      ctx.fillStyle = "#d6dbe4";
      ctx.fillRect(dryerX, dryerY, dryerW, dryerH);
      ctx.fillStyle = "#eef2f8";
      ctx.fillRect(dryerX + 4, dryerY + 4, dryerW - 8, dryerH - 16);
      const drumR = 22, drumX = dryerX + dryerW / 2, drumY = dryerY + dryerH / 2 + 2;
      ctx.fillStyle = "#202a35";
      ctx.beginPath(); ctx.arc(drumX, drumY, drumR, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#4f6275";
      ctx.beginPath(); ctx.arc(drumX, drumY, drumR - 4, 0, Math.PI * 2); ctx.fill();
      const angle = frame * 0.15;
      const items = [{ r: drumR - 7, emoji: "🍞" }, { r: drumR - 10, emoji: "🥐" }, { r: drumR - 12, emoji: "🥖" }];
      ctx.font = "8px serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      items.forEach((c, i) => {
        const a = angle + (i * Math.PI * 2) / items.length;
        const cx = drumX + Math.cos(a) * c.r;
        const cy = drumY + Math.sin(a) * c.r;
        ctx.fillText(c.emoji, cx, cy);
      });
      ctx.textAlign = "start";
      ctx.textBaseline = "alphabetic";
      ctx.fillStyle = "#c0c7d2";
      ctx.fillRect(drumX + drumR + 4, drumY - 6, 4, 12);
      ctx.fillStyle = "#b2b7c2";
      ctx.fillRect(dryerX + 6, dryerY + 6, dryerW - 12, 8);
      ctx.fillStyle = "#8891a0";
      ctx.fillRect(dryerX + 10, dryerY + 7, 16, 6);
      ctx.fillStyle = "#dfe3ec";
      ctx.beginPath(); ctx.arc(dryerX + dryerW - 14, dryerY + 10, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#f5f7fb";
      ctx.font = "7px monospace";
      ctx.fillText("TUMBLE DRY", 6, 12);
    }

    function drawLaundryRoomScene(ctx, w, h, px, frame) {
      ctx.fillStyle = "#10151f";
      ctx.fillRect(0, 0, w, h);
      const floorY = Math.floor(h * 0.78);
      ctx.fillStyle = "#232a36";
      ctx.fillRect(0, floorY, w, h - floorY);
      ctx.fillStyle = "#d8dee8";
      ctx.fillRect(6, floorY - 52, 40, 50);
      ctx.fillRect(w - 46, floorY - 52, 40, 50);
      ctx.fillStyle = "#f0f3fa";
      ctx.fillRect(8, floorY - 50, 36, 12);
      ctx.fillRect(w - 44, floorY - 50, 36, 12);
      ctx.fillStyle = "#212836";
      ctx.beginPath();
      ctx.arc(26, floorY - 20, 12, 0, Math.PI * 2);
      ctx.arc(w - 26, floorY - 20, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#445068";
      ctx.beginPath();
      ctx.arc(26, floorY - 20, 9, 0, Math.PI * 2);
      ctx.arc(w - 26, floorY - 20, 9, 0, Math.PI * 2);
      ctx.fill();
      const spin = frame * 0.18;
      const drumR = 7;
      const breadEmoji = ["🍞", "🥐", "🥖"];
      ctx.font = "5px serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      [26, w - 26].forEach((cx, idx) => {
        breadEmoji.forEach((e, i) => {
          const a = spin + (i * Math.PI * 2) / breadEmoji.length + idx * 0.6;
          const x = cx + Math.cos(a) * (drumR - 1);
          const y = floorY - 20 + Math.sin(a) * (drumR - 1);
          ctx.fillText(e, x, y);
        });
      });
      ctx.textAlign = "start";
      ctx.textBaseline = "alphabetic";
      ctx.fillStyle = "#d0d6e0";
      ctx.fillRect(w / 2 - 10, floorY - 60, 20, 18);
      ctx.fillStyle = "#f7f3e2";
      ctx.beginPath();
      ctx.moveTo(w / 2 - 8, floorY - 60); ctx.lineTo(w / 2 + 8, floorY - 60);
      ctx.lineTo(w / 2 + 3, floorY - 38); ctx.lineTo(w / 2 - 3, floorY - 38);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#f5f7fb";
      ctx.font = "7px monospace";
      ctx.fillText("SPIN CYCLE", 6, 12);
    }

    function drawPacmanScene(ctx, w, h, px, frame) {
      const midY = h / 2;
      // dots
      for (let x = 10; x < w; x += 12) {
        ctx.fillStyle = "#fff";
        ctx.fillRect(x, midY - 1, 3, 3);
      }
      // erase eaten dots
      const pacX = 8 + frame * 4;
      ctx.fillStyle = "#000";
      ctx.fillRect(0, midY - 4, pacX - 4, 10);
      // pac-man
      ctx.fillStyle = "#ff0";
      ctx.beginPath();
      const mouth = Math.abs(Math.sin(frame * 0.5)) * 0.8;
      ctx.arc(pacX, midY, 8, mouth, Math.PI * 2 - mouth);
      ctx.lineTo(pacX, midY);
      ctx.fill();
      // ghost chasing
      const ghostX = pacX - 30;
      if (ghostX > 0) {
        ctx.fillStyle = "#f00";
        ctx.fillRect(ghostX - 7, midY - 8, 14, 14);
        ctx.fillRect(ghostX - 8, midY - 4, 16, 8);
        // ghost eyes
        ctx.fillStyle = "#fff";
        ctx.fillRect(ghostX - 4, midY - 6, 4, 4);
        ctx.fillRect(ghostX + 2, midY - 6, 4, 4);
        ctx.fillStyle = "#00f";
        ctx.fillRect(ghostX - 3, midY - 5, 2, 2);
        ctx.fillRect(ghostX + 3, midY - 5, 2, 2);
        // ghost skirt
        ctx.fillStyle = "#f00";
        for (let i = 0; i < 4; i++) {
          ctx.fillRect(ghostX - 8 + i * 5, midY + 6, 3, 3);
        }
      }
      // second ghost
      const g2X = ghostX - 22;
      if (g2X > 0) {
        ctx.fillStyle = "#f0f";
        ctx.fillRect(g2X - 7, midY - 8, 14, 14);
        ctx.fillRect(g2X - 8, midY - 4, 16, 8);
        ctx.fillStyle = "#fff";
        ctx.fillRect(g2X - 4, midY - 6, 4, 4);
        ctx.fillRect(g2X + 2, midY - 6, 4, 4);
      }
      // score
      ctx.fillStyle = "#fff";
      ctx.font = "8px monospace";
      ctx.fillText(`SCORE ${frame * 10}`, 4, 10);
    }

    function drawSnakeScene(ctx, w, h, px, frame) {
      // grid
      const gridSize = 6;
      // snake body
      const segments = [];
      let sx = 40, sy = 40;
      const path = [{dx:1,dy:0},{dx:1,dy:0},{dx:0,dy:1},{dx:0,dy:1},{dx:1,dy:0},{dx:1,dy:0},{dx:1,dy:0},{dx:0,dy:-1},{dx:1,dy:0}];
      for (let i = 0; i < 8 + Math.floor(frame / 4); i++) {
        const p = path[i % path.length];
        segments.push({x: sx, y: sy});
        sx += p.dx * gridSize;
        sy += p.dy * gridSize;
        if (sx > w - 10) sx = 10;
        if (sy > h - 10) sy = 10;
      }
      // draw snake
      const headIdx = Math.min(frame, segments.length - 1);
      for (let i = Math.max(0, headIdx - 12); i <= headIdx; i++) {
        const fade = 1 - (headIdx - i) / 13;
        ctx.fillStyle = `rgba(0, ${Math.floor(150 + fade * 105)}, 0, ${fade})`;
        ctx.fillRect(segments[i].x, segments[i].y, gridSize - 1, gridSize - 1);
      }
      // food
      ctx.fillStyle = "#f00";
      ctx.fillRect(100 + (frame * 3) % 40, 60 + (frame * 7) % 30, gridSize - 1, gridSize - 1);
      // score
      ctx.fillStyle = "#fff";
      ctx.font = "8px monospace";
      ctx.fillText(`SCORE ${frame * 10}`, 4, 10);
    }

    function drawWargamesScene(ctx, w, h, px, frame) {
      // WOPR terminal style
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, w, h);
      ctx.font = "9px monospace";
      ctx.fillStyle = "#0f0";

      const lines = [
        "LOGON:",
        "  Joshua",
        "",
        "GREETINGS PROFESSOR FALKEN.",
        "",
        "SHALL WE PLAY A GAME?",
        "",
        "LIST OF GAMES:",
        "  CHESS",
        "  POKER",
        "  FIGHTER COMBAT",
        "  GUERRILLA ENGAGEMENT",
        "  GLOBAL THERMONUCLEAR WAR",
        "",
        "> GLOBAL THERMONUCLEAR WAR",
        "",
        "FINE.",
      ];

      const visibleLines = Math.min(lines.length, Math.floor(frame / 2) + 1);
      for (let i = 0; i < visibleLines; i++) {
        const lineText = lines[i];
        const charsVisible = Math.min(lineText.length, (frame - i * 2) * 3);
        ctx.fillText(lineText.slice(0, charsVisible), 6, 14 + i * 10);
      }

      // blinking cursor
      if (frame % 6 < 3) {
        const lastLine = Math.min(visibleLines - 1, lines.length - 1);
        const cursorX = 6 + lines[lastLine].length * 5.5;
        ctx.fillRect(cursorX, 6 + lastLine * 10, 5, 8);
      }

      // scanline effect
      for (let y = 0; y < h; y += 3) {
        ctx.fillStyle = "rgba(0,0,0,0.15)";
        ctx.fillRect(0, y, w, 1);
      }
    }

    function createWoprMapScene(ctx, w, h) {
      const detonations = [];
      const missiles = [];
      let tickCounter = 0;
      let totalStrikes = 0;

      // Crude continent outlines (normalized coordinates)
      const continents = [
        [[0.08,0.18],[0.12,0.15],[0.18,0.15],[0.22,0.20],[0.24,0.28],[0.22,0.32],[0.20,0.38],[0.18,0.42],[0.14,0.44],[0.10,0.38],[0.06,0.28],[0.08,0.18]],
        [[0.14,0.42],[0.18,0.40],[0.20,0.44],[0.16,0.46],[0.14,0.42]],
        [[0.22,0.52],[0.26,0.48],[0.30,0.52],[0.32,0.60],[0.30,0.70],[0.28,0.80],[0.24,0.84],[0.22,0.75],[0.20,0.62],[0.22,0.52]],
        [[0.44,0.15],[0.47,0.12],[0.50,0.14],[0.53,0.16],[0.52,0.22],[0.48,0.26],[0.46,0.30],[0.43,0.28],[0.42,0.22],[0.44,0.15]],
        [[0.54,0.14],[0.42,0.20],[0.44,0.26],[0.46,0.30],[0.48,0.28]],
        [[0.44,0.34],[0.48,0.30],[0.54,0.34],[0.56,0.42],[0.56,0.52],[0.54,0.60],[0.50,0.68],[0.46,0.64],[0.44,0.55],[0.42,0.45],[0.44,0.34]],
        [[0.52,0.14],[0.58,0.10],[0.66,0.10],[0.74,0.12],[0.82,0.14],[0.88,0.18],[0.92,0.25],[0.88,0.30],[0.82,0.35],[0.76,0.40],[0.70,0.38],[0.64,0.34],[0.58,0.28],[0.54,0.22],[0.52,0.14]],
        [[0.80,0.60],[0.86,0.56],[0.92,0.60],[0.94,0.66],[0.90,0.72],[0.84,0.70],[0.80,0.64],[0.80,0.60]],
      ];

      const targets = [
        {x:0.15,y:0.25},{x:0.12,y:0.32},{x:0.18,y:0.22},{x:0.10,y:0.30},{x:0.20,y:0.28},
        {x:0.48,y:0.18},{x:0.50,y:0.22},{x:0.52,y:0.17},{x:0.60,y:0.14},{x:0.68,y:0.12},
        {x:0.82,y:0.32},{x:0.86,y:0.36},{x:0.56,y:0.26},{x:0.46,y:0.20},
      ];

      return function draw(frame) {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, w, h);
        tickCounter++;

        // Draw continents
        ctx.strokeStyle = "rgba(0, 180, 0, 0.35)";
        ctx.lineWidth = 0.8;
        for (const cont of continents) {
          ctx.beginPath();
          ctx.moveTo(cont[0][0] * w, cont[0][1] * h);
          for (let i = 1; i < cont.length; i++) ctx.lineTo(cont[i][0] * w, cont[i][1] * h);
          ctx.stroke();
        }

        // Target dots
        for (const t of targets) {
          ctx.fillStyle = "rgba(0, 255, 0, 0.5)";
          ctx.fillRect(t.x * w - 0.5, t.y * h - 0.5, 1.5, 1.5);
        }

        // Launch missiles
        if (tickCounter % 18 === 0 && tickCounter < 260) {
          const from = targets[Math.floor(Math.random() * targets.length)];
          let to;
          do { to = targets[Math.floor(Math.random() * targets.length)]; } while (to === from);
          missiles.push({ x1: from.x*w, y1: from.y*h, x2: to.x*w, y2: to.y*h, progress: 0 });
        }

        // Update & draw missiles
        for (let i = missiles.length - 1; i >= 0; i--) {
          const m = missiles[i];
          m.progress += 0.025;
          const cx = (m.x1 + m.x2) / 2;
          const cy = Math.min(m.y1, m.y2) - 20;
          // Draw arc trail
          ctx.strokeStyle = `rgba(255, 255, 255, ${0.5 - m.progress * 0.3})`;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          for (let s = 0; s <= m.progress; s += 0.04) {
            const tx = (1-s)*(1-s)*m.x1 + 2*(1-s)*s*cx + s*s*m.x2;
            const ty = (1-s)*(1-s)*m.y1 + 2*(1-s)*s*cy + s*s*m.y2;
            s === 0 ? ctx.moveTo(tx, ty) : ctx.lineTo(tx, ty);
          }
          ctx.stroke();
          // Missile head
          const t = m.progress;
          const px = (1-t)*(1-t)*m.x1 + 2*(1-t)*t*cx + t*t*m.x2;
          const py = (1-t)*(1-t)*m.y1 + 2*(1-t)*t*cy + t*t*m.y2;
          ctx.fillStyle = "#fff";
          ctx.fillRect(px - 1, py - 1, 2, 2);

          if (m.progress >= 1) {
            detonations.push({ x: m.x2, y: m.y2, radius: 0, maxRadius: 5 + Math.random() * 10, age: 0 });
            totalStrikes++;
            missiles.splice(i, 1);
          }
        }

        // Draw detonations
        for (let i = detonations.length - 1; i >= 0; i--) {
          const d = detonations[i];
          d.age++;
          d.radius = Math.min(d.maxRadius, d.radius + 0.4);
          const fade = Math.max(0, 1 - d.age / 80);
          if (fade <= 0) { detonations.splice(i, 1); continue; }
          ctx.strokeStyle = `rgba(255, 255, 255, ${fade})`;
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.arc(d.x, d.y, d.radius, 0, Math.PI * 2);
          ctx.stroke();
          if (d.age < 6) {
            ctx.fillStyle = `rgba(255, 255, 255, ${(1 - d.age / 6) * 0.8})`;
            ctx.beginPath();
            ctx.arc(d.x, d.y, d.radius * 0.3, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // HUD
        ctx.fillStyle = "#0f0";
        ctx.font = "7px monospace";
        ctx.fillText("WOPR SIMULATION", 4, 8);
        ctx.fillText("DEFCON 1", w - 48, 8);
        ctx.fillText(`STRIKES: ${totalStrikes}`, 4, h - 4);
        // scanlines
        for (let y = 0; y < h; y += 3) {
          ctx.fillStyle = "rgba(0,0,0,0.15)";
          ctx.fillRect(0, y, w, 1);
        }
      };
    }

    function createFighterScene(ctx, w, h) {
      let p1hp = 60, p2hp = 60, round = 1, timer = 99;
      const floorY = h - 16;
      let p1x = 30, p2x = w - 40;
      let p1action = '', p2action = '';
      let p1aTimer = 0, p2aTimer = 0;
      let koMsg = '', koTimer = 0;
      let tickCounter = 0;
      const projectiles = [];
      const hits = [];

      function drawFighter(x, y, color, facing, action) {
        ctx.fillStyle = color;
        ctx.fillRect(x, y - 20, 8, 16); // body
        ctx.fillRect(x + 1, y - 26, 6, 6); // head
        if (action === 'punch') {
          ctx.fillRect(facing > 0 ? x + 8 : x - 14, y - 18, 14, 3);
        } else if (action === 'kick') {
          ctx.fillRect(facing > 0 ? x + 8 : x - 10, y - 8, 10, 3);
          ctx.fillRect(x + (facing > 0 ? 5 : 0), y - 4, 3, 12); // one leg kicks
          ctx.fillRect(x + (facing > 0 ? 0 : 5), y - 4, 3, 10);
          return;
        } else if (action === 'block') {
          ctx.fillRect(facing > 0 ? x + 6 : x - 2, y - 22, 4, 14); // arms up
        } else {
          ctx.fillRect(facing > 0 ? x + 8 : x - 6, y - 14, 6, 3);
        }
        ctx.fillRect(facing > 0 ? x - 4 : x + 8, y - 16, 4, 3); // back arm
        ctx.fillRect(x, y - 4, 3, 10);
        ctx.fillRect(x + 5, y - 4, 3, 10);
      }

      return function draw(frame) {
        ctx.fillStyle = "#111"; ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = "#333"; ctx.fillRect(0, floorY, w, h - floorY);
        tickCounter++;

        if (koMsg) {
          koTimer++;
          ctx.fillStyle = "#fff"; ctx.font = "bold 10px monospace";
          ctx.fillText(koMsg, w/2 - 25, h/2 - 10);
          if (koTimer > 80) {
            round++; p1hp = 60; p2hp = 60; timer = 99; koMsg = ''; koTimer = 0;
            p1x = 30; p2x = w - 40;
          }
          drawFighter(p1x, floorY, "#0cf", 1, '');
          drawFighter(p2x, floorY, "#f44", -1, '');
        } else {
          // Timer
          if (tickCounter % 10 === 0 && timer > 0) timer--;

          // AI combat
          if (p1aTimer <= 0 && Math.random() < 0.12) {
            const r = Math.random();
            p1action = r < 0.4 ? 'punch' : r < 0.7 ? 'kick' : r < 0.85 ? 'block' : 'hadouken';
            p1aTimer = p1action === 'hadouken' ? 15 : 8;
            if (p1action === 'hadouken') projectiles.push({x: p1x + 12, y: floorY - 14, vx: 2.5, owner: 1});
          }
          if (p2aTimer <= 0 && Math.random() < 0.10) {
            const r = Math.random();
            p2action = r < 0.45 ? 'punch' : r < 0.75 ? 'kick' : 'block';
            p2aTimer = 8;
          }

          // Movement
          const dist = p2x - p1x;
          if (dist > 20) { p1x += 0.5; p2x -= 0.3; }
          if (dist < 15) { p1x -= 0.5; p2x += 0.5; }
          p1x += Math.sin(frame * 0.15) * 0.5;
          p2x -= Math.sin(frame * 0.12) * 0.5;

          // Hit detection
          if (p1aTimer > 3 && (p1action === 'punch' || p1action === 'kick') && dist < 25 && p2action !== 'block') {
            const dmg = p1action === 'kick' ? 4 : 3;
            p2hp = Math.max(0, p2hp - dmg);
            if (p1aTimer === 7) hits.push({x: p2x, y: floorY - 16, t: 8});
          }
          if (p2aTimer > 3 && (p2action === 'punch' || p2action === 'kick') && dist < 25 && p1action !== 'block') {
            const dmg = p2action === 'kick' ? 4 : 3;
            p1hp = Math.max(0, p1hp - dmg);
            if (p2aTimer === 7) hits.push({x: p1x + 8, y: floorY - 16, t: 8});
          }

          // Projectiles
          for (let i = projectiles.length - 1; i >= 0; i--) {
            const p = projectiles[i];
            p.x += p.vx;
            if (p.x > p2x - 5 && p.x < p2x + 10 && p2action !== 'block') {
              p2hp = Math.max(0, p2hp - 6);
              hits.push({x: p2x, y: floorY - 14, t: 10});
              projectiles.splice(i, 1);
            } else if (p.x > w) { projectiles.splice(i, 1); }
          }

          p1aTimer--; p2aTimer--;
          if (p1aTimer <= 0) p1action = '';
          if (p2aTimer <= 0) p2action = '';

          // KO check
          if (p1hp <= 0) { koMsg = 'K.O.!'; }
          if (p2hp <= 0) { koMsg = p2hp <= 0 && p1hp <= 0 ? 'DOUBLE K.O.!' : 'K.O.!'; }
          if (timer <= 0 && !koMsg) koMsg = p1hp > p2hp ? 'P1 WINS!' : p2hp > p1hp ? 'P2 WINS!' : 'DRAW!';

          drawFighter(p1x, floorY, "#0cf", 1, p1action);
          drawFighter(p2x, floorY, "#f44", -1, p2action);
        }

        // Projectiles
        for (const p of projectiles) {
          ctx.fillStyle = "#0ff"; ctx.beginPath();
          ctx.arc(p.x, p.y, 4 + Math.sin(frame) * 1.5, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = "#fff"; ctx.beginPath();
          ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
        }

        // Hit effects
        for (let i = hits.length - 1; i >= 0; i--) {
          hits[i].t--;
          if (hits[i].t <= 0) { hits.splice(i, 1); continue; }
          ctx.fillStyle = `rgba(255,255,0,${hits[i].t/10})`;
          ctx.font = "bold 8px monospace";
          ctx.fillText("HIT!", hits[i].x - 5, hits[i].y - hits[i].t);
        }

        // HUD
        ctx.fillStyle = "#333"; ctx.fillRect(6, 6, 60, 8); ctx.fillRect(w-66, 6, 60, 8);
        ctx.fillStyle = p1hp > 20 ? "#0f0" : "#f00"; ctx.fillRect(6, 6, p1hp, 8);
        ctx.fillStyle = p2hp > 20 ? "#0f0" : "#f00"; ctx.fillRect(w-6-p2hp, 6, p2hp, 8);
        ctx.fillStyle = "#ff0"; ctx.font = "8px monospace";
        ctx.fillText(`ROUND ${round}`, w/2 - 22, 12);
        ctx.fillStyle = "#fff"; ctx.font = "12px monospace";
        ctx.fillText(String(timer), w/2 - 6, 26);
        ctx.font = "7px monospace"; ctx.fillText("P1", 6, 22); ctx.fillText("P2", w-16, 22);
      };
    }

    function drawAdventureScene(ctx, w, h, px, frame) {
      // Sierra-style adventure game
      // sky
      ctx.fillStyle = "#114";
      ctx.fillRect(0, 0, w, h * 0.5);
      // ground
      ctx.fillStyle = "#141";
      ctx.fillRect(0, h * 0.5, w, h * 0.5);
      // stars
      for (let i = 0; i < 12; i++) {
        ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.random() * 0.7})`;
        ctx.fillRect((i * 37 + 11) % w, (i * 13 + 7) % (h * 0.45), 1, 1);
      }
      // building/structure
      ctx.fillStyle = "#333";
      ctx.fillRect(w * 0.6, h * 0.25, 40, h * 0.25);
      ctx.fillStyle = "#444";
      ctx.fillRect(w * 0.62, h * 0.28, 10, 12);
      ctx.fillRect(w * 0.78, h * 0.28, 10, 12);
      ctx.fillStyle = "#ff0";
      ctx.fillRect(w * 0.64, h * 0.3, 6, 6);
      // door
      ctx.fillStyle = "#552";
      ctx.fillRect(w * 0.7, h * 0.38, 8, 12);

      // character (Roger Wilco-esque)
      const charX = 20 + (frame * 1.5) % (w - 40);
      const charY = h * 0.5 - 16;
      ctx.fillStyle = "#fff";
      ctx.fillRect(charX, charY, 6, 8); // body
      ctx.fillRect(charX + 1, charY - 5, 4, 5); // head
      ctx.fillStyle = "#00f";
      ctx.fillRect(charX, charY + 2, 6, 4); // pants
      // legs walking
      if (frame % 4 < 2) {
        ctx.fillRect(charX + 1, charY + 8, 2, 4);
        ctx.fillRect(charX + 3, charY + 8, 2, 3);
      } else {
        ctx.fillRect(charX + 1, charY + 8, 2, 3);
        ctx.fillRect(charX + 3, charY + 8, 2, 4);
      }

      // text box at bottom
      ctx.fillStyle = "rgba(0,0,0,0.8)";
      ctx.fillRect(4, h - 28, w - 8, 24);
      ctx.strokeStyle = "#666";
      ctx.strokeRect(4, h - 28, w - 8, 24);
      ctx.fillStyle = "#fff";
      ctx.font = "7px monospace";
      const texts = [
        "You are standing outside a",
        "mysterious building. A sign",
        "reads: 'SIERRA ON-LINE'",
      ];
      const visibleText = Math.min(texts.length, Math.floor(frame / 8) + 1);
      for (let i = 0; i < visibleText; i++) {
        ctx.fillText(texts[i], 8, h - 20 + i * 8);
      }

      // title bar
      ctx.fillStyle = "#00a";
      ctx.fillRect(0, 0, w, 10);
      ctx.fillStyle = "#fff";
      ctx.font = "7px monospace";
      ctx.fillText("Space Quest XII    Score: " + (frame * 5), 4, 8);
    }

    function drawKeenScene(ctx, w, h, px, frame) {
      // Commander Keen side-scroller
      // sky
      ctx.fillStyle = "#48f";
      ctx.fillRect(0, 0, w, h * 0.65);
      // clouds
      ctx.fillStyle = "#fff";
      for (let i = 0; i < 3; i++) {
        const cx = ((i * 60 + 20) - frame * 0.3 + w * 2) % (w + 40) - 20;
        ctx.fillRect(cx, 10 + i * 12, 24, 6);
        ctx.fillRect(cx + 4, 6 + i * 12, 16, 4);
      }
      // ground tiles
      ctx.fillStyle = "#84c";
      ctx.fillRect(0, h * 0.65, w, h * 0.35);
      ctx.fillStyle = "#63a";
      for (let x = 0; x < w; x += 12) {
        ctx.fillRect(x, h * 0.65, 11, 3);
      }
      // platforms
      ctx.fillStyle = "#888";
      ctx.fillRect(30, h * 0.45, 40, 6);
      ctx.fillRect(90, h * 0.35, 35, 6);
      ctx.fillRect(20, h * 0.55, 25, 6);

      // Keen character
      const keenX = 20 + (frame * 1.5) % (w - 30);
      const keenY = h * 0.65 - 18;
      const jumping = Math.sin(frame * 0.15) > 0.5;
      const jumpOffset = jumping ? -12 : 0;

      // helmet (green)
      ctx.fillStyle = "#0a0";
      ctx.fillRect(keenX, keenY - 6 + jumpOffset, 8, 4);
      ctx.fillRect(keenX + 1, keenY - 8 + jumpOffset, 6, 2);
      // face
      ctx.fillStyle = "#fca";
      ctx.fillRect(keenX + 1, keenY - 2 + jumpOffset, 6, 4);
      // eyes
      ctx.fillStyle = "#000";
      ctx.fillRect(keenX + 2, keenY - 1 + jumpOffset, 1, 1);
      ctx.fillRect(keenX + 5, keenY - 1 + jumpOffset, 1, 1);
      // body (red shirt)
      ctx.fillStyle = "#f00";
      ctx.fillRect(keenX + 1, keenY + 2 + jumpOffset, 6, 6);
      // arms
      if (frame % 8 < 4) {
        ctx.fillRect(keenX - 2, keenY + 3 + jumpOffset, 3, 2);
        ctx.fillRect(keenX + 7, keenY + 4 + jumpOffset, 3, 2);
      } else {
        ctx.fillRect(keenX - 2, keenY + 4 + jumpOffset, 3, 2);
        ctx.fillRect(keenX + 7, keenY + 3 + jumpOffset, 3, 2);
      }
      // pants (blue)
      ctx.fillStyle = "#00f";
      ctx.fillRect(keenX + 1, keenY + 8 + jumpOffset, 6, 3);
      // legs/boots
      ctx.fillStyle = "#840";
      if (frame % 6 < 3) {
        ctx.fillRect(keenX + 1, keenY + 11 + jumpOffset, 2, 3);
        ctx.fillRect(keenX + 5, keenY + 11 + jumpOffset, 2, 2);
      } else {
        ctx.fillRect(keenX + 1, keenY + 11 + jumpOffset, 2, 2);
        ctx.fillRect(keenX + 5, keenY + 11 + jumpOffset, 2, 3);
      }

      // ray gun blast
      if (frame % 20 < 4) {
        ctx.fillStyle = "#0f0";
        for (let b = 0; b < 3; b++) {
          ctx.fillRect(keenX + 10 + b * 8, keenY + 3 + jumpOffset, 6, 2);
        }
      }

      // enemies (slugs)
      for (let e = 0; e < 2; e++) {
        const ex = (w - 20 - e * 50 - frame * 0.8 + w * 10) % (w + 20) - 10;
        ctx.fillStyle = "#0a0";
        ctx.fillRect(ex, h * 0.65 - 6, 8, 6);
        ctx.fillStyle = "#0f0";
        ctx.fillRect(ex + 1, h * 0.65 - 8, 3, 2);
        ctx.fillStyle = "#000";
        ctx.fillRect(ex + 1, h * 0.65 - 7, 1, 1);
      }

      // collectibles (lollipops)
      for (let c = 0; c < 4; c++) {
        const lx = 30 + c * 35;
        if (Math.abs(keenX - lx) > 8) {
          ctx.fillStyle = "#f0f";
          ctx.fillRect(lx, h * 0.65 - 14, 4, 4);
          ctx.fillStyle = "#840";
          ctx.fillRect(lx + 1, h * 0.65 - 10, 2, 5);
        }
      }

      // HUD
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, w, 12);
      ctx.fillStyle = "#fff";
      ctx.font = "8px monospace";
      ctx.fillText("CMDR KEEN EP4", 4, 9);
      ctx.fillStyle = "#ff0";
      ctx.fillText(`SCORE ${(frame * 100) % 99999}`, w - 70, 9);
    }

    function createDoomScene(ctx, w, h) {
      // Randomized Doom level — different wall textures, enemies, weapons
      const levelType = Math.floor(Math.random() * 4); // 0=corridor, 1=room, 2=outdoor, 3=hell
      const wallBaseColors = [
        {r:120,g:80,b:40},   // brown tech walls (E1M1)
        {r:100,g:100,b:100}, // grey stone
        {r:80,g:40,b:30},    // red hell
        {r:60,g:80,b:60},    // green marble
      ];
      const ceilColors = ["#333","#444","#200","#411"];
      const floorColors = ["#555","#665","#433","#543"];
      const wc = wallBaseColors[levelType];
      let hp = 100, armor = 50, ammo = 50;
      const enemies = [];
      let killCount = 0;
      let weapon = Math.floor(Math.random() * 3); // 0=pistol, 1=shotgun, 2=chaingun
      let firing = false, fireTimer = 0;
      let playerAngle = 0, playerBob = 0;

      // spawn initial enemies
      for (let i = 0; i < 2 + Math.floor(Math.random() * 3); i++) {
        enemies.push({
          x: (Math.random() - 0.5) * 60,
          dist: 30 + Math.random() * 50,
          type: Math.floor(Math.random() * 3), // 0=zombie, 1=imp, 2=demon
          hp: [1, 2, 3][Math.floor(Math.random() * 3)],
          hitTimer: 0, dead: false
        });
      }

      return function draw(frame) {
        playerBob = Math.sin(frame * 0.08) * 2;
        playerAngle = Math.sin(frame * 0.02) * 8;

        // ceiling & floor
        ctx.fillStyle = ceilColors[levelType];
        ctx.fillRect(0, 0, w, h * 0.4);
        ctx.fillStyle = floorColors[levelType];
        ctx.fillRect(0, h * 0.6, w, h * 0.4);

        // walls with texture variation
        for (let col = 0; col < w; col += 3) {
          const viewCol = col - w/2 + playerAngle;
          const distFromCenter = Math.abs(viewCol) / (w/2);
          const wallH = h * 0.55 * (1 - distFromCenter * 0.5);
          const wallTop = h/2 - wallH/2 + playerBob;
          const shade = 0.4 + (1 - distFromCenter) * 0.6;
          const r = Math.floor(wc.r * shade);
          const g = Math.floor(wc.g * shade);
          const b = Math.floor(wc.b * shade);
          ctx.fillStyle = `rgb(${r},${g},${b})`;
          ctx.fillRect(col, wallTop, 3, wallH);

          // texture detail (vertical lines for panels)
          if (col % 12 === 0) {
            ctx.fillStyle = `rgb(${Math.max(0,r-15)},${Math.max(0,g-15)},${Math.max(0,b-15)})`;
            ctx.fillRect(col, wallTop, 1, wallH);
          }
          // horizontal band (tech detail)
          if (levelType === 0 && distFromCenter < 0.7) {
            ctx.fillStyle = `rgb(${Math.min(255,r+30)},${Math.min(255,g+20)},${b})`;
            ctx.fillRect(col, wallTop + wallH * 0.45, 3, 2);
          }
        }

        // Doors/openings based on level type
        if (levelType <= 1) {
          const doorW = 24; const doorH = h * 0.35;
          ctx.fillStyle = "#555";
          ctx.fillRect(w/2 - doorW/2 + playerAngle, h/2 - doorH/2 + playerBob, doorW, doorH);
          ctx.fillStyle = "#666";
          ctx.fillRect(w/2 + playerAngle + 6, h/2 + playerBob - 2, 3, 4);
        }

        // light pillars for E1M1 feel
        if (levelType === 0) {
          for (let i = -1; i <= 1; i += 2) {
            const px = w/2 + i * 50 + playerAngle;
            ctx.fillStyle = "#aaa";
            ctx.fillRect(px, h*0.35 + playerBob, 4, h*0.3);
            ctx.fillStyle = "#dda";
            ctx.fillRect(px, h*0.34 + playerBob, 4, 3);
          }
        }

        // Enemies
        for (const e of enemies) {
          if (e.dead) continue;
          const screenX = w/2 + e.x - playerAngle;
          const scale = Math.max(0.3, 1 - e.dist / 100);
          const eW = 12 * scale, eH = 18 * scale;
          const eY = h/2 - eH/2 + playerBob;

          if (e.hitTimer > 0) { ctx.fillStyle = "#fff"; e.hitTimer--; }
          else ctx.fillStyle = ["#584","#a44","#840"][e.type];
          ctx.fillRect(screenX - eW/2, eY, eW, eH);
          // eyes
          if (scale > 0.4) {
            ctx.fillStyle = "#f00";
            ctx.fillRect(screenX - eW*0.25, eY + eH*0.15, eW*0.2, eW*0.15);
            ctx.fillRect(screenX + eW*0.1, eY + eH*0.15, eW*0.2, eW*0.15);
          }
          // enemies slowly approach
          e.dist -= 0.08;
          e.x += Math.sin(frame * 0.1 + e.x) * 0.3;
          if (e.dist < 10) { hp -= 2; e.dist = 10 + Math.random() * 10; }
        }

        // Weapon firing AI
        if (!firing && frame % 20 === 0 && enemies.some(e => !e.dead)) {
          firing = true; fireTimer = weapon === 2 ? 6 : 3;
          ammo = Math.max(0, ammo - (weapon === 2 ? 3 : 1));
        }
        if (firing) {
          fireTimer--;
          if (fireTimer <= 0) {
            firing = false;
            // hit closest enemy
            const alive = enemies.filter(e => !e.dead).sort((a,b) => a.dist - b.dist);
            if (alive.length > 0) {
              alive[0].hp -= weapon === 1 ? 2 : 1;
              alive[0].hitTimer = 3;
              if (alive[0].hp <= 0) { alive[0].dead = true; killCount++; }
            }
          }
        }

        // Respawn enemies
        if (enemies.every(e => e.dead) && frame % 30 === 0) {
          for (let i = 0; i < 2; i++)
            enemies.push({ x: (Math.random()-0.5)*60, dist: 50+Math.random()*40, type: Math.floor(Math.random()*3), hp: 2, hitTimer: 0, dead: false });
        }

        // Weapon sprite
        const wx = w/2 - 8 + playerBob * 0.5;
        const weaponNames = ["PISTOL","SHOTGUN","CHAINGUN"];
        if (weapon === 0) { // pistol
          ctx.fillStyle = "#888"; ctx.fillRect(wx, h-32, 16, 22);
          ctx.fillStyle = "#666"; ctx.fillRect(wx+5, h-38, 6, 8);
        } else if (weapon === 1) { // shotgun
          ctx.fillStyle = "#777"; ctx.fillRect(wx-2, h-36, 20, 26);
          ctx.fillStyle = "#555"; ctx.fillRect(wx+3, h-48, 4, 14);
          ctx.fillRect(wx+9, h-48, 4, 14);
        } else { // chaingun
          ctx.fillStyle = "#888"; ctx.fillRect(wx-4, h-34, 24, 24);
          ctx.fillStyle = "#666"; ctx.fillRect(wx+2, h-44, 3, 12);
          ctx.fillRect(wx+7, h-44, 3, 12);
          ctx.fillRect(wx+12, h-44, 3, 12);
        }
        // muzzle flash
        if (firing && fireTimer > 0) {
          ctx.fillStyle = "#ff0"; ctx.fillRect(wx+2, h-52, 12, 6);
          ctx.fillStyle = "#fff"; ctx.fillRect(wx+4, h-54, 8, 4);
        }

        // Status bar (Doom-style)
        ctx.fillStyle = "#444"; ctx.fillRect(0, h-16, w, 16);
        ctx.fillStyle = "#333"; ctx.fillRect(0, h-16, w, 1);
        // sections
        ctx.fillStyle = "#fff"; ctx.font = "6px monospace";
        ctx.fillText("AMMO", 3, h-10); ctx.fillText(String(ammo), 3, h-3);
        ctx.fillText("HEALTH", 30, h-10);
        ctx.fillStyle = hp > 25 ? "#0f0" : "#f00"; ctx.fillText(hp+"%", 30, h-3);
        ctx.fillStyle = "#fff"; ctx.fillText("ARMS", w/2+12, h-10);

    function drawPinwheelScene(ctx, w, h, px, frame) {
      // Mac OS spinning beach ball of death
      const grad = ctx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, "#e8e8e8");
      grad.addColorStop(1, "#d0d0d0");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      // fake window title bar
      ctx.fillStyle = "#f0f0f0";
      ctx.fillRect(10, 8, w - 20, 14);
      ctx.strokeStyle = "#ccc";
      ctx.strokeRect(10, 8, w - 20, 14);
      ctx.fillStyle = "#ff5f56"; ctx.beginPath(); ctx.arc(20, 15, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#ffbd2e"; ctx.beginPath(); ctx.arc(30, 15, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#27c93f"; ctx.beginPath(); ctx.arc(40, 15, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#333";
      ctx.font = "7px sans-serif";
      ctx.fillText("Finder", w/2 - 12, 18);

      // window body
      ctx.fillStyle = "#fff";
      ctx.fillRect(10, 22, w - 20, h - 32);
      ctx.strokeStyle = "#ccc";
      ctx.strokeRect(10, 22, w - 20, h - 32);

      ctx.fillStyle = "#999";
      ctx.font = "7px sans-serif";
      ctx.fillText("Application Not Responding", w/2 - 55, h/2 - 25);

      // spinning rainbow beach ball — the real macOS one
      // It's a disc split into colored segments that smooth-blend:
      // Top half: saturated rainbow. Bottom half: pastel/lighter rainbow.
      const cx = w / 2;
      const cy = h / 2 + 8;
      const radius = 14;
      const rotation = frame * 0.12; // smooth continuous spin
      const segments = 36; // smooth circle

      // The macOS pinwheel has 6 color bands, each spanning 60 degrees:
      // Red, Orange, Yellow, Green, Blue, Purple (saturated half)
      // Then mirrored as lighter versions on the other half
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotation);

      // draw the rainbow disc
      for (let i = 0; i < segments; i++) {
        const angle = (i / segments) * Math.PI * 2;
        const nextAngle = ((i + 1) / segments) * Math.PI * 2;
        const normAngle = (i / segments) * 360;

        // top half (0-180) is saturated, bottom half (180-360) is lighter
        let hue, sat, light;
        if (normAngle < 180) {
          hue = normAngle * 2; // spread full rainbow across top half
          sat = 90;
          light = 50;
        } else {
          hue = (normAngle - 180) * 2;
          sat = 60;
          light = 75;
        }

        ctx.fillStyle = `hsl(${hue}, ${sat}%, ${light}%)`;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, angle, nextAngle + 0.02); // slight overlap to avoid gaps
        ctx.closePath();
        ctx.fill();
      }

      // dark outline
      ctx.strokeStyle = "rgba(0,0,0,0.2)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.stroke();

      // small dark center (no white dot — matches real macOS pinwheel)
      ctx.fillStyle = "rgba(0,0,0,0.15)";
      ctx.beginPath();
      ctx.arc(0, 0, 1.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();

      // subtle drop shadow
      ctx.fillStyle = "rgba(0,0,0,0.08)";
      ctx.beginPath();
      ctx.ellipse(cx + 1, cy + radius + 3, radius * 0.7, 2, 0, 0, Math.PI * 2);
      ctx.fill();

      if (frame > 60) {
        ctx.fillStyle = "#999";
        ctx.font = "6px sans-serif";
        ctx.fillText("⌘⌥⎋ Force Quit", w/2 - 30, h - 14);
      }
    }
